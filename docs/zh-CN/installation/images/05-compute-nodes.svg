          <rect x="3" y="7" width="7" height="3" fill="#8A5E38"/>
          <rect x="13" y="7" width="7" height="3" fill="#8A5E38"/>
          <rect x="3" y="13" width="7" height="3" fill="#8A5E38"/>
          <rect x="13" y="13" width="7" height="3" fill="#8A5E38"/>
