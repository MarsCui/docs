          <text x="14" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">GPU</text>
        </g>
        <text x="55" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#8A5E38">Worker 2</text>
        <line x1="14" y1="72" x2="96" y2="72" stroke="#F8F1EC" stroke-width="1"/>
        <text x="55" y="92" text-anchor="middle" font-size="10" fill="#3F3F46">GPU ×N</text>
        <text x="55" y="108" text-anchor="middle" font-size="10" fill="#3F3F46">驱动 + RT</text>
        <text x="55" y="148" text-anchor="middle" font-size="10" font-style="italic" fill="#8A5E38">推理任务</text>
      </g>

      <g transform="translate(240, 14)">
        <rect x="0" y="0" width="110" height="170" rx="8" fill="#FFFFFF" stroke="#8A5E38" stroke-width="1.5"/>
        <g transform="translate(41, 16)">
          <rect x="0" y="0" width="28" height="28" rx="4" fill="#8A5E38"/>
          <text x="14" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">NPU</text>
        </g>
        <text x="55" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#8A5E38">Worker 3</text>
        <line x1="14" y1="72" x2="96" y2="72" stroke="#F8F1EC" stroke-width="1"/>
        <text x="55" y="92" text-anchor="middle" font-size="10" fill="#3F3F46">NPU ×N</text>
        <text x="55" y="108" text-anchor="middle" font-size="10" fill="#3F3F46">驱动 + RT</text>
