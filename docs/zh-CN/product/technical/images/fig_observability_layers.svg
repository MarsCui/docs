<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="650" viewBox="0 0 1600 650" role="img" aria-labelledby="title desc">
  <title id="title">调用问题排查的三类证据</title>
  <desc id="desc">使用调用记录、服务与部署状态、基础设施资源状态三类证据，在相同时间范围、模型和业务对象下人工关联定位问题。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .card-title { font: 700 25px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .card-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .num { font: 700 20px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .band-title { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; }
      .band-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
    </style>
  </defs>
  <rect width="1600" height="650" fill="#ffffff"/>
  <text x="72" y="66" class="title">调用问题排查的三类证据</text>
  <text x="72" y="104" class="subtitle">三类信息需要使用相同时间范围、模型和业务对象进行人工关联</text>

  <g stroke="#667085" stroke-width="3" marker-end="url(#arrow)">
    <line x1="500" y1="298" x2="550" y2="298"/>
    <line x1="1010" y1="298" x2="1060" y2="298"/>
  </g>

  <g transform="translate(72 160)">
    <rect width="428" height="276" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="38" cy="38" r="23" fill="#4b6fae"/>
    <text x="38" y="38" class="num">1</text>
    <text x="76" y="47" class="card-title">调用记录</text>
    <text x="28" y="105" class="card-desc">调用概览：总量、成功、失败和限流</text>
    <text x="28" y="148" class="card-desc">调用统计：按模型查看结果和趋势</text>
    <text x="28" y="191" class="card-desc">调用日志：时间、状态、耗时和错误</text>
    <text x="28" y="234" class="card-desc">用途：确认异常请求及其业务表现</text>
  </g>

  <g transform="translate(550 160)">
    <rect width="460" height="276" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="38" cy="38" r="23" fill="#c56a2d"/>
    <text x="38" y="38" class="num">2</text>
    <text x="76" y="47" class="card-title">服务与部署状态</text>
    <text x="28" y="105" class="card-desc">发布、审核、可见范围和 Endpoint</text>
    <text x="28" y="148" class="card-desc">Key、配额、限流和调用权限</text>
    <text x="28" y="191" class="card-desc">我的部署或在线推理任务状态</text>
    <text x="28" y="234" class="card-desc">用途：确认服务链路和配置是否可用</text>
  </g>

  <g transform="translate(1060 160)">
    <rect width="468" height="276" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="38" cy="38" r="23" fill="#2f8f64"/>
    <text x="38" y="38" class="num">3</text>
    <text x="76" y="47" class="card-title">基础设施资源状态</text>
    <text x="28" y="105" class="card-desc">集群、节点、设备和作业状态</text>
    <text x="28" y="148" class="card-desc">CPU、内存、显存、温度和利用率</text>
    <text x="28" y="191" class="card-desc">资源水位、硬件健康和任务异常</text>
    <text x="28" y="234" class="card-desc">用途：判断资源层是否影响模型服务</text>
  </g>

  <g transform="translate(72 482)">
    <rect width="1456" height="104" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
    <text x="28" y="42" class="band-title">关联条件</text>
    <text x="28" y="75" class="band-desc">固定时间范围、模型、调用 ID、部署对象和资源对象；平台不默认承诺自动完成全链路根因分析</text>
  </g>
</svg>
