    <text x="220" y="16" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5F4ECF">通过以下端口管控算力集群:</text>
    <text x="20" y="32" font-size="10.5" fill="#4A3EB0" font-weight="600">6443</text>
    <text x="52" y="32" font-size="10" fill="#71717A">K8s API</text>
    <text x="115" y="32" font-size="10.5" fill="#4A3EB0" font-weight="600">32761</text>
    <text x="150" y="32" font-size="10" fill="#71717A">监控</text>
    <text x="195" y="32" font-size="10.5" fill="#4A3EB0" font-weight="600">32762</text>
    <text x="230" y="32" font-size="10" fill="#71717A">模型/IDE</text>
    <text x="295" y="32" font-size="10.5" fill="#4A3EB0" font-weight="600">32763</text>
    <text x="332" y="32" font-size="10" fill="#71717A">备用</text>
    <text x="370" y="32" font-size="10.5" fill="#4A3EB0" font-weight="600">32764/65</text>
  </g>

  <!-- Arrows down from management to two pools -->
