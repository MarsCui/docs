<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">AGIOne 前六项业务链路能力联动闭环</title>
  <desc id="desc">算力纳管、模型模板、快速部署、模型发布、模型聚合和计量计费形成业务链路，调用可观测贯穿全链路，资源利用率反馈驱动规划与扩容。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <marker id="feedback-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a6432"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .card-title { font: 700 21px Arial, "Microsoft YaHei", sans-serif; fill: #182230; text-anchor: middle; }
      .num { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .arrow-label { font: 700 15px Arial, "Microsoft YaHei", sans-serif; fill: #344054; text-anchor: middle; }
      .band-title { font: 700 25px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .band-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #eef4ff; }
      .feedback { font: 700 19px Arial, "Microsoft YaHei", sans-serif; fill: #7a4b24; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1600" height="760" fill="#ffffff"/>
  <text x="72" y="66" class="title">AGIOne 前六项业务链路能力联动闭环</text>
  <text x="72" y="104" class="subtitle">业务能力顺序联动，调用可观测贯穿全链路，运营结果反馈资源规划</text>

  <g stroke="#667085" stroke-width="3" marker-end="url(#arrow)">
    <line x1="252" y1="285" x2="312" y2="285"/>
    <line x1="492" y1="285" x2="552" y2="285"/>
    <line x1="732" y1="285" x2="792" y2="285"/>
    <line x1="972" y1="285" x2="1032" y2="285"/>
    <line x1="1212" y1="285" x2="1272" y2="285"/>
  </g>
  <text x="282" y="243" class="arrow-label">提供算力</text>
  <text x="522" y="243" class="arrow-label">选择最佳</text>
  <text x="762" y="243" class="arrow-label">实例就绪</text>
  <text x="1002" y="243" class="arrow-label">Endpoint</text>
  <text x="1242" y="243" class="arrow-label">调用数据</text>

  <g transform="translate(72 200)">
    <rect width="180" height="170" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="90" cy="42" r="21" fill="#4b6fae"/><text x="90" y="42" class="num">1</text>
    <text x="90" y="102" class="card-title">算力纳管</text>
  </g>
  <g transform="translate(312 200)">
    <rect width="180" height="170" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="90" cy="42" r="21" fill="#2f8f64"/><text x="90" y="42" class="num">2</text>
    <text x="90" y="102" class="card-title">模型模板</text>
  </g>
  <g transform="translate(552 200)">
    <rect width="180" height="170" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="90" cy="42" r="21" fill="#c56a2d"/><text x="90" y="42" class="num">3</text>
    <text x="90" y="102" class="card-title">快速部署</text>
  </g>
  <g transform="translate(792 200)">
    <rect width="180" height="170" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
    <circle cx="90" cy="42" r="21" fill="#7256c8"/><text x="90" y="42" class="num">4</text>
    <text x="90" y="102" class="card-title">模型发布</text>
  </g>
  <g transform="translate(1032 200)">
    <rect width="180" height="170" rx="8" fill="#e9f7f6" stroke="#238c83" stroke-width="2"/>
    <circle cx="90" cy="42" r="21" fill="#238c83"/><text x="90" y="42" class="num">5</text>
    <text x="90" y="102" class="card-title">模型聚合</text>
  </g>
  <g transform="translate(1272 200)">
    <rect width="180" height="170" rx="8" fill="#fff8e1" stroke="#b58a16" stroke-width="2"/>
    <circle cx="90" cy="42" r="21" fill="#b58a16"/><text x="90" y="42" class="num">6</text>
    <text x="90" y="102" class="card-title">计量计费</text>
  </g>

  <g stroke="#4b6fae" stroke-width="2" stroke-dasharray="6 10">
    <line x1="162" y1="370" x2="162" y2="438"/>
    <line x1="402" y1="370" x2="402" y2="438"/>
    <line x1="642" y1="370" x2="642" y2="438"/>
    <line x1="882" y1="370" x2="882" y2="438"/>
    <line x1="1122" y1="370" x2="1122" y2="438"/>
    <line x1="1362" y1="370" x2="1362" y2="438"/>
  </g>

  <path d="M 1362 370 L 1362 650 L 162 650 L 162 370" fill="none" stroke="#9a6432" stroke-width="3" stroke-dasharray="12 10" marker-end="url(#feedback-arrow)"/>

  <g transform="translate(72 438)">
    <rect width="1400" height="112" rx="8" fill="#4b6fae" stroke="#36598f" stroke-width="2"/>
    <circle cx="48" cy="56" r="24" fill="#ffffff"/><text x="48" y="56" class="num" style="fill:#4b6fae">7</text>
    <text x="90" y="48" class="band-title">调用可观测（贯穿全链路）</text>
    <text x="90" y="80" class="band-desc">连接算力纳管、模型模板、快速部署、模型发布、模型聚合和计量计费</text>
  </g>

  <rect x="472" y="608" width="656" height="72" rx="8" fill="#fff2e8" stroke="#9a6432" stroke-width="2"/>
  <text x="800" y="638" class="feedback">资源利用率反馈</text>
  <text x="800" y="664" class="feedback">（驱动规划与扩容）</text>
</svg>
