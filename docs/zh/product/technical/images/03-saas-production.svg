<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Inter Variable, Inter, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="vpcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF5F0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EEF5F0" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="cardShadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1025" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3F3F46"/>
    </marker>
    <marker id="arrow3g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3A7252"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="url(#bg3)"/>

  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1025">生产部署架构 · 公有云 SaaS（推荐）</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#71717A">High Availability · Managed Middlewares · Auto-scalable Business Nodes</text>

  <!-- User & DNS -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="110" height="52" rx="26" fill="#1A1025" filter="url(#cardShadow3)"/>
    <circle cx="30" cy="26" r="9" fill="#FFFFFF"/>
    <path d="M 21 40 Q 30 30 39 40" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
    <text x="70" y="31" font-size="13" font-weight="600" fill="#FFFFFF">用户</text>
  </g>

  <line x1="170" y1="126" x2="220" y2="126" stroke="#3F3F46" stroke-width="2" marker-end="url(#arrow3)"/>

  <g transform="translate(220, 100)">
    <rect x="0" y="0" width="110" height="52" rx="8" fill="#FFFFFF" stroke="#3F3F46" stroke-width="1.5" filter="url(#cardShadow3)"/>
    <g transform="translate(14, 14)">
      <circle cx="12" cy="12" r="11" fill="none" stroke="#1A1025" stroke-width="1.8"/>
      <text x="12" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1025">DNS</text>
    </g>
    <text x="70" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#1A1025">DNS</text>
    <text x="70" y="40" text-anchor="middle" font-size="10.5" fill="#71717A">域名解析</text>
  </g>

  <line x1="330" y1="126" x2="400" y2="126" stroke="#3F3F46" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- ELB -->
  <g transform="translate(400, 90)">
    <rect x="0" y="0" width="400" height="74" rx="10" fill="#EEF1F8" stroke="#4A6298" stroke-width="2" filter="url(#cardShadow3)"/>
    <rect x="0" y="0" width="6" height="74" rx="3" fill="#4A6298"/>
    <g transform="translate(22, 18)">
      <rect x="0" y="0" width="32" height="32" rx="5" fill="#4A6298"/>
      <path d="M 6 10 L 26 10 M 6 16 L 26 16 M 6 22 L 26 22" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="68" y="32" font-size="14" font-weight="700" fill="#4A6298">ELB · 弹性负载均衡</text>
    <text x="68" y="54" font-size="11.5" fill="#4A6298">公网 ≥ 100 Mbps · 监听 443 (HTTPS) / 80 (HTTP) / 18090</text>
  </g>

  <!-- VPC container -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="1080" height="500" rx="14" fill="url(#vpcGrad)" stroke="#3A7252" stroke-width="2" stroke-dasharray="8 4"/>

    <!-- VPC label -->
    <g transform="translate(20, -14)">
      <rect x="0" y="0" width="240" height="28" rx="14" fill="#3A7252"/>
      <g transform="translate(12, 7)">
        <path d="M 0 7 Q 0 0 7 0 L 13 0 Q 20 0 20 7 L 20 13 Q 20 14 19 14 L 1 14 Q 0 14 0 13 Z" fill="#FFFFFF"/>
      </g>
      <text x="40" y="19" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">公有云 VPC (Single VPC)</text>
    </g>

    <!-- Business Nodes -->
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="640" height="200" rx="10" fill="#FFFFFF" stroke="#5F4ECF" stroke-width="1.5"/>
      <rect x="0" y="0" width="640" height="32" rx="10" fill="#5F4ECF"/>
      <rect x="0" y="22" width="640" height="10" fill="#5F4ECF"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">业务节点 · MANAGEMENT NODES (≥2, 可水平扩展)</text>

      <!-- 3 nodes -->
      <g transform="translate(30, 56)">
        <rect x="0" y="0" width="180" height="130" rx="8" fill="#F2EEF8" stroke="#5F4ECF" stroke-width="1.2"/>
        <g transform="translate(14, 14)">
          <rect x="0" y="0" width="28" height="28" rx="5" fill="#5F4ECF"/>
          <path d="M 8 14 L 12 18 L 20 10" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="52" y="26" font-size="13" font-weight="700" fill="#4A3EB0">Node #1</text>
        <text x="52" y="42" font-size="10.5" fill="#4A3EB0">AGIOne Core</text>
        <line x1="14" y1="56" x2="166" y2="56" stroke="#F2EEF8" stroke-width="1"/>
        <text x="14" y="74" font-size="10.5" fill="#3F3F46">CPU: 8 vCPU</text>
        <text x="14" y="90" font-size="10.5" fill="#3F3F46">RAM: 16 GiB</text>
        <text x="14" y="106" font-size="10.5" fill="#3F3F46">系统盘: 100 GiB</text>
        <text x="14" y="122" font-size="10.5" fill="#3F3F46">数据盘: 400 GiB</text>
      </g>

      <g transform="translate(230, 56)">
        <rect x="0" y="0" width="180" height="130" rx="8" fill="#F2EEF8" stroke="#5F4ECF" stroke-width="1.2"/>
        <g transform="translate(14, 14)">
          <rect x="0" y="0" width="28" height="28" rx="5" fill="#5F4ECF"/>
          <path d="M 8 14 L 12 18 L 20 10" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="52" y="26" font-size="13" font-weight="700" fill="#4A3EB0">Node #2</text>
        <text x="52" y="42" font-size="10.5" fill="#4A3EB0">AGIOne Core</text>
        <line x1="14" y1="56" x2="166" y2="56" stroke="#F2EEF8" stroke-width="1"/>
        <text x="14" y="74" font-size="10.5" fill="#3F3F46">CPU: 8 vCPU</text>
        <text x="14" y="90" font-size="10.5" fill="#3F3F46">RAM: 16 GiB</text>
        <text x="14" y="106" font-size="10.5" fill="#3F3F46">系统盘: 100 GiB</text>
        <text x="14" y="122" font-size="10.5" fill="#3F3F46">数据盘: 400 GiB</text>
      </g>

      <g transform="translate(430, 56)">
        <rect x="0" y="0" width="180" height="130" rx="8" fill="#FFFFFF" stroke="#6A4E9A" stroke-width="1.2" stroke-dasharray="4 3"/>
        <g transform="translate(14, 14)">
          <rect x="0" y="0" width="28" height="28" rx="5" fill="#6A4E9A"/>
          <text x="14" y="20" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">+</text>
        </g>
        <text x="52" y="26" font-size="13" font-weight="700" fill="#4A3EB0">Node #N</text>
        <text x="52" y="42" font-size="10.5" fill="#6A4E9A">可扩展</text>
        <line x1="14" y1="56" x2="166" y2="56" stroke="#F2EEF8" stroke-width="1"/>
        <text x="14" y="78" font-size="10.5" fill="#71717A">基准: 2000 req/min</text>
        <text x="14" y="96" font-size="10.5" fill="#71717A">每节点新增:</text>
        <text x="14" y="112" font-size="10.5" fill="#71717A">+500 req/min</text>
      </g>
    </g>

    <!-- Managed Middlewares -->
    <g transform="translate(720, 50)">
      <rect x="0" y="0" width="320" height="200" rx="10" fill="#FFFFFF" stroke="#8A5E38" stroke-width="1.5"/>
      <rect x="0" y="0" width="320" height="32" rx="10" fill="#8A5E38"/>
      <rect x="0" y="22" width="320" height="10" fill="#8A5E38"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">托管中间件 · MANAGED</text>

      <!-- RDS -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="140" height="64" rx="6" fill="#F8F1EC" stroke="#8A5E38" stroke-width="1.2"/>
        <g transform="translate(12, 16)">
          <ellipse cx="14" cy="6" rx="14" ry="4" fill="#8A5E38"/>
          <path d="M 0 6 L 0 26 Q 0 32 14 32 Q 28 32 28 26 L 28 6" fill="#8A5E38" opacity="0.85"/>
          <ellipse cx="14" cy="14" rx="14" ry="4" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
        </g>
        <text x="50" y="22" font-size="12" font-weight="700" fill="#8A5E38">RDS</text>
        <text x="50" y="36" font-size="10" fill="#8A5E38">主从, ≥3 节点</text>
        <text x="50" y="50" font-size="10" fill="#8A5E38">4C/16G/100G</text>
      </g>

      <g transform="translate(170, 50)">
        <rect x="0" y="0" width="130" height="64" rx="6" fill="#F8F1EC" stroke="#8A5E38" stroke-width="1.2"/>
        <g transform="translate(12, 16)">
          <circle cx="14" cy="16" r="12" fill="none" stroke="#8A5E38" stroke-width="2"/>
          <circle cx="14" cy="16" r="4" fill="#8A5E38"/>
        </g>
        <text x="46" y="22" font-size="12" font-weight="700" fill="#8A5E38">Nacos</text>
        <text x="46" y="38" font-size="10" fill="#8A5E38">服务发现</text>
        <text x="46" y="52" font-size="10" fill="#8A5E38">Basic</text>
      </g>

      <g transform="translate(20, 122)">
        <rect x="0" y="0" width="140" height="64" rx="6" fill="#F8F1EC" stroke="#8A5E38" stroke-width="1.2"/>
        <g transform="translate(12, 16)">
          <rect x="0" y="6" width="28" height="20" rx="4" fill="#8A5E38"/>
        </g>
        <text x="50" y="22" font-size="12" font-weight="700" fill="#8A5E38">Redis</text>
        <text x="50" y="36" font-size="10" fill="#8A5E38">缓存</text>
        <text x="50" y="50" font-size="10" fill="#8A5E38">Basic</text>
      </g>

      <g transform="translate(170, 122)">
        <rect x="0" y="0" width="130" height="64" rx="6" fill="#F8F1EC" stroke="#8A5E38" stroke-width="1.2"/>
        <g transform="translate(10, 16)">
          <circle cx="6" cy="6" r="4" fill="#8A5E38"/>
          <circle cx="22" cy="6" r="4" fill="#8A5E38"/>
          <circle cx="14" cy="22" r="4" fill="#8A5E38"/>
          <line x1="6" y1="6" x2="22" y2="6" stroke="#8A5E38" stroke-width="1.5"/>
          <line x1="6" y1="6" x2="14" y2="22" stroke="#8A5E38" stroke-width="1.5"/>
          <line x1="22" y1="6" x2="14" y2="22" stroke="#8A5E38" stroke-width="1.5"/>
        </g>
        <text x="46" y="22" font-size="12" font-weight="700" fill="#8A5E38">Kafka</text>
        <text x="46" y="36" font-size="10" fill="#8A5E38">≥3 节点</text>
        <text x="46" y="50" font-size="10" fill="#8A5E38">≥100G</text>
      </g>
    </g>

    <!-- Object Storage & Shared Storage (bottom) -->
    <g transform="translate(40, 280)">
      <rect x="0" y="0" width="460" height="100" rx="10" fill="#FFFFFF" stroke="#4A6298" stroke-width="1.5"/>
      <rect x="0" y="0" width="460" height="32" rx="10" fill="#4A6298"/>
      <rect x="0" y="22" width="460" height="10" fill="#4A6298"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">对象存储 · OBJECT STORAGE</text>

      <g transform="translate(30, 50)">
        <g transform="translate(0, 6)">
          <path d="M 6 32 L 6 14 L 12 8 L 28 8 L 34 14 L 34 32 Z" fill="#4A6298"/>
          <path d="M 12 8 L 12 22 L 28 22 L 28 8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
        </g>
        <text x="56" y="20" font-size="13" font-weight="700" fill="#4A6298">OSS / S3 兼容</text>
        <text x="56" y="38" font-size="10.5" fill="#4A6298">通过 AK/SK 访问 · 存储图片等静态资源</text>
      </g>
    </g>

    <g transform="translate(520, 280)">
      <rect x="0" y="0" width="520" height="100" rx="10" fill="#FFFFFF" stroke="#71717A" stroke-width="1.5" stroke-dasharray="6 3"/>
      <rect x="0" y="0" width="520" height="32" rx="10" fill="#71717A"/>
      <rect x="0" y="22" width="520" height="10" fill="#71717A"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">共享存储 · SHARED STORAGE (可选)</text>

      <g transform="translate(30, 50)">
        <g transform="translate(0, 6)">
          <rect x="0" y="6" width="36" height="6" rx="1" fill="#71717A"/>
          <rect x="0" y="16" width="36" height="6" rx="1" fill="#71717A"/>
          <rect x="0" y="26" width="36" height="6" rx="1" fill="#71717A"/>
          <circle cx="32" cy="9" r="1" fill="#FFFFFF"/>
          <circle cx="32" cy="19" r="1" fill="#FFFFFF"/>
          <circle cx="32" cy="29" r="1" fill="#FFFFFF"/>
        </g>
        <text x="56" y="20" font-size="13" font-weight="700" fill="#3F3F46">块存储 / 共享存储</text>
        <text x="56" y="38" font-size="10.5" fill="#3F3F46">≥ 1024 GB · 供管理节点共享使用</text>
      </g>
    </g>

    <!-- Capacity callout -->
    <g transform="translate(40, 410)">
      <rect x="0" y="0" width="1000" height="60" rx="8" fill="#EEF5F0" stroke="#3A7252" stroke-width="1.2"/>
      <g transform="translate(16, 20)">
        <circle cx="10" cy="10" r="10" fill="#3A7252"/>
        <path d="M 5 11 L 9 15 L 16 7" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="46" y="26" font-size="12" font-weight="700" fill="#3A7252">容量规划</text>
      <text x="46" y="46" font-size="11" fill="#3A7252">每个业务节点 (8C/16G) ≈ 2000 请求/分钟 · 长连接场景每新增一节点 ≈ +500 请求/分钟</text>
    </g>
  </g>

  <!-- Arrows from ELB to business nodes (purple) -->
  <path d="M 600 164 C 600 205 475 225 350 250" stroke="#5F4ECF" stroke-width="2" fill="none" marker-end="url(#arrow3)" opacity="0.8"/>

  <!-- Arrow to business → middlewares (internal) - drawn as bidirectional inside VPC -->
  <line x1="700" y1="330" x2="780" y2="330" stroke="#8A5E38" stroke-width="1.8" stroke-dasharray="3 2"/>

  <!-- Legend / Network requirements -->
  <g transform="translate(60, 720)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#1A1025">网络要求:</text>
    <text x="80" y="0" font-size="10.5" fill="#3F3F46">• 所有组件位于同一 VPC</text>
    <text x="280" y="0" font-size="10.5" fill="#3F3F46">• 公网入口 ≥ 100 Mbps</text>
    <text x="450" y="0" font-size="10.5" fill="#3F3F46">• 生产配置域名 + HTTPS</text>
    <text x="650" y="0" font-size="10.5" fill="#3F3F46">• 对象存储通过 AK/SK 鉴权访问</text>
  </g>
</svg>
