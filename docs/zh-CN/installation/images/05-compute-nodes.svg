        <line x1="14" y1="56" x2="146" y2="56" stroke="#F8F1EC" stroke-width="1"/>
        <text x="14" y="72" font-size="10" fill="#71717A">仅 1 节点 (节点总数 &lt; 3)</text>
      </g>
