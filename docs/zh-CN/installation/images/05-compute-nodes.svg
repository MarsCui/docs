      <text x="100" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">算力池 A · 节点数 &lt; 3</text>
    </g>

    <!-- K8s control plane (single) -->
    <g transform="translate(30, 40)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#8A5E38" letter-spacing="1">KUBERNETES 控制面 · 单节点</text>
      <g transform="translate(0, 14)">
