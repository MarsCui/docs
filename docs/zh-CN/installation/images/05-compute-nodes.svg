        <text x="14" y="76" font-size="10" fill="#8A5E38">✓ etcd 多副本</text>
        <text x="14" y="94" font-size="10" fill="#8A5E38">✓ Worker 可扩展</text>
        <text x="14" y="112" font-size="10" fill="#8A5E38">✓ 镜像就近拉取</text>
