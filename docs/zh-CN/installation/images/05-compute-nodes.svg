        <text x="114" y="62" font-size="10" font-weight="700" fill="#8A5E38">Master 2</text>
        <text x="114" y="74" font-size="9" fill="#8A5E38">API/etcd</text>

        <g transform="translate(214, 12)">
          <polygon points="14,2 24,8 24,18 14,24 4,18 4,8" fill="#8A5E38"/>
          <polygon points="14,2 24,8 14,14 4,8" fill="#8A5E38"/>
