<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter Variable, Inter, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="poolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F1EC" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F8F1EC" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="cardShadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1025" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3F3F46"/>
    </marker>
    <marker id="arrow5p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5F4ECF"/>
    </marker>
    <marker id="arrow5o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A5E38"/>
