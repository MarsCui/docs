    <tspan x="2450.0" dy="54">Observability</tspan>
    <tspan x="2450.0" dy="54">(End-to-End)</tspan>
  </text>
  <text x="500" y="1480" class="agione-text" font-size="32" font-weight="400" fill="#4A6298" text-anchor="start">Provide Compute</text>
