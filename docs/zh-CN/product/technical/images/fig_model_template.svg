<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">On-Prem 与 On-Cloud 模型部署资产</title>
  <desc id="desc">On-Prem 由模型配置、显存测算、框架配置和推理模板组成；On-Cloud 由推理镜像、推理框架和模型库组成。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .lane { font: 700 25px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; }
      .lane-desc { font: 400 17px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .card-title { font: 700 22px Arial, "Microsoft YaHei", sans-serif; fill: #182230; text-anchor: middle; }
      .card-desc { font: 400 16.5px Arial, "Microsoft YaHei", sans-serif; fill: #475467; text-anchor: middle; }
      .num { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>
  <rect width="1600" height="720" fill="#ffffff"/>
  <text x="72" y="62" class="title">On-Prem 与 On-Cloud 模型部署资产</text>
  <text x="72" y="100" class="subtitle">两套资产链路分别服务本地算力部署和云上模型部署</text>

  <g transform="translate(72 132)">
    <rect width="1456" height="240" rx="8" fill="#f7f9fc" stroke="#4b6fae" stroke-width="2"/>
    <text x="26" y="42" class="lane">AI Infra On-Prem</text>
    <text x="260" y="42" class="lane-desc">沉淀本地部署所需的模型、容量、运行环境和用户部署入口</text>

    <g stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)">
      <line x1="342" y1="143" x2="358" y2="143"/>
      <line x1="674" y1="143" x2="690" y2="143"/>
      <line x1="1006" y1="143" x2="1022" y2="143"/>
    </g>

    <g transform="translate(26 72)">
      <rect width="316" height="142" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
      <circle cx="30" cy="30" r="19" fill="#4b6fae"/><text x="30" y="30" class="num">1</text>
      <text x="158" y="58" class="card-title">模型配置</text>
      <text x="158" y="96" class="card-desc">模型版本、来源、量化与集群</text>
    </g>
    <g transform="translate(358 72)">
      <rect width="316" height="142" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
      <circle cx="30" cy="30" r="19" fill="#2f8f64"/><text x="30" y="30" class="num">2</text>
      <text x="158" y="58" class="card-title">显存测算</text>
      <text x="158" y="96" class="card-desc">精度、KV Token 与推荐规格</text>
    </g>
    <g transform="translate(690 72)">
      <rect width="316" height="142" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
      <circle cx="30" cy="30" r="19" fill="#c56a2d"/><text x="30" y="30" class="num">3</text>
      <text x="158" y="58" class="card-title">框架配置</text>
      <text x="158" y="96" class="card-desc">镜像、命令、端口与环境变量</text>
    </g>
    <g transform="translate(1022 72)">
      <rect width="408" height="142" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
      <circle cx="30" cy="30" r="19" fill="#7256c8"/><text x="30" y="30" class="num">4</text>
      <text x="204" y="58" class="card-title">推理模板</text>
      <text x="204" y="96" class="card-desc">组合模型、框架、规格与表单参数</text>
    </g>
  </g>

  <g transform="translate(72 406)">
    <rect width="1456" height="240" rx="8" fill="#f7f9fc" stroke="#238c83" stroke-width="2"/>
    <text x="26" y="42" class="lane">AI Infra On-Cloud</text>
    <text x="270" y="42" class="lane-desc">按云平台和地域维护云上部署所需的运行资产与模型配置</text>

    <g stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)">
      <line x1="410" y1="143" x2="444" y2="143"/>
      <line x1="866" y1="143" x2="900" y2="143"/>
    </g>

    <g transform="translate(26 72)">
      <rect width="384" height="142" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
      <circle cx="30" cy="30" r="19" fill="#4b6fae"/><text x="30" y="30" class="num">1</text>
      <text x="192" y="58" class="card-title">推理镜像</text>
      <text x="192" y="96" class="card-desc">云平台、地域与镜像仓库路径</text>
    </g>
    <g transform="translate(444 72)">
      <rect width="422" height="142" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
      <circle cx="30" cy="30" r="19" fill="#2f8f64"/><text x="30" y="30" class="num">2</text>
      <text x="211" y="58" class="card-title">推理框架</text>
      <text x="211" y="96" class="card-desc">框架版本、镜像、命令、端口与变量</text>
    </g>
    <g transform="translate(900 72)">
      <rect width="530" height="142" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
      <circle cx="30" cy="30" r="19" fill="#c56a2d"/><text x="30" y="30" class="num">3</text>
      <text x="265" y="58" class="card-title">模型库</text>
      <text x="265" y="96" class="card-desc">元模型、部署点、云上模型、算力方案与输出配置</text>
    </g>
  </g>
</svg>
