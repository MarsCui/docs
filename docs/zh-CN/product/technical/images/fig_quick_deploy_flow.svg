<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" role="img" aria-labelledby="title desc">
  <title id="title">快速部署三步流程</title>
  <desc id="desc">选择模型模板并完成模型选定，自动扫描算力池并筛选可用规格，规格选定后启动部署并全程可视化展示，通常十到十五分钟完成上线。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .step { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .card-title { font: 700 27px Arial, "Microsoft YaHei", sans-serif; fill: #182230; text-anchor: middle; }
      .card-desc { font: 400 20px Arial, "Microsoft YaHei", sans-serif; fill: #475467; text-anchor: middle; }
      .arrow-label { font: 700 19px Arial, "Microsoft YaHei", sans-serif; fill: #344054; text-anchor: middle; }
      .note { font: 700 20px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1600" height="600" fill="#ffffff"/>
  <text x="72" y="66" class="title">快速部署三步流程</text>
  <text x="72" y="104" class="subtitle">模型选定 → 规格选定 → 启动部署</text>

  <g stroke="#667085" stroke-width="3" marker-end="url(#arrow)">
    <line x1="432" y1="310" x2="620" y2="310"/>
    <line x1="980" y1="310" x2="1168" y2="310"/>
  </g>
  <text x="526" y="286" class="arrow-label">模型选定</text>
  <text x="1074" y="286" class="arrow-label">规格选定</text>

  <g transform="translate(72 158)">
    <rect width="360" height="304" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="38" cy="38" r="23" fill="#4b6fae"/>
    <text x="38" y="38" class="step">1</text>
    <text x="180" y="84" class="card-title">选择模型模板</text>
    <text x="180" y="139" class="card-desc">Qwen2.5 · DeepSeek</text>
    <text x="180" y="180" class="card-desc">Qwen-VL · ……</text>
    <text x="180" y="254" class="note">Step 1</text>
  </g>

  <g transform="translate(620 158)">
    <rect width="360" height="304" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="38" cy="38" r="23" fill="#c56a2d"/>
    <text x="38" y="38" class="step">2</text>
    <text x="180" y="84" class="card-title">筛选可用规格</text>
    <text x="180" y="139" class="card-desc">自动扫描算力池</text>
    <text x="180" y="180" class="card-desc">列出所有满足规格的</text>
    <text x="180" y="216" class="card-desc">候选方案</text>
    <text x="180" y="270" class="note">Step 2</text>
  </g>

  <g transform="translate(1168 158)">
    <rect width="360" height="304" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="38" cy="38" r="23" fill="#2f8f64"/>
    <text x="38" y="38" class="step">3</text>
    <text x="180" y="84" class="card-title">一键启动部署</text>
    <text x="180" y="139" class="card-desc">全程可视化展示</text>
    <text x="180" y="190" class="card-desc">通常 10~15 分钟</text>
    <text x="180" y="226" class="card-desc">完成上线</text>
    <text x="180" y="270" class="note">Step 3</text>
  </g>

  <rect x="72" y="500" width="1456" height="56" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
  <text x="800" y="536" class="note">选择模型模板 → 自动筛选候选规格 → 启动并查看部署全过程</text>
</svg>
