<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="480" viewBox="0 0 1140 480" role="img" aria-labelledby="title desc">
  <title id="title">AGIOne Aggregation Targets</title>
  <desc id="desc">AGIOne styled SVG recreation preserving the original technical diagram structure.</desc>
  <defs>
