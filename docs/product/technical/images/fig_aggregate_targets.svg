<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">Five Matching Strategies of the Aggregated Model</title>
  <desc id="desc">The aggregated model provides a unified Model ID. The model provider selects a matching strategy from cost-first, success-rate-first, balanced cost and experience, random, and round-robin.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; letter-spacing: 0; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; letter-spacing: 0; }
      .hub-title { font: 700 25px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; text-anchor: middle; letter-spacing: 0; }
      .hub-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; text-anchor: middle; letter-spacing: 0; }
      .card-title { font: 700 22px Arial, "Microsoft YaHei", sans-serif; fill: #182230; text-anchor: middle; letter-spacing: 0; }
      .card-desc { font: 400 16px Arial, "Microsoft YaHei", sans-serif; fill: #475467; text-anchor: middle; letter-spacing: 0; }
      .num { font: 700 19px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; letter-spacing: 0; }
      .note { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="620" fill="#ffffff"/>
  <text x="72" y="66" class="title">Five Matching Strategies of the Aggregated Model</text>
  <text x="72" y="104" class="subtitle">Options come from the current creation page; verify actual routing through call logs.</text>

  <g transform="translate(500 130)">
    <rect width="600" height="92" rx="8" fill="#eaf0fb" stroke="#4b6fae" stroke-width="2"/>
    <text x="300" y="39" class="hub-title">Aggregated Model</text>
    <text x="300" y="69" class="hub-desc">Unified Model ID · Multiple eligible member models</text>
  </g>

  <g stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="800" y1="222" x2="192" y2="256"/>
    <line x1="800" y1="222" x2="480" y2="256"/>
    <line x1="800" y1="222" x2="768" y2="256"/>
    <line x1="800" y1="222" x2="1056" y2="256"/>
    <line x1="800" y1="222" x2="1344" y2="256"/>
  </g>

  <g transform="translate(72 256)">
    <rect width="240" height="210" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#4b6fae"/><text x="120" y="42" class="num">1</text>
    <text x="120" y="94" class="card-title">Cost-first</text>
    <text x="120" y="132" class="card-desc">Prioritize member cost</text>
    <text x="120" y="163" class="card-desc">Prices follow current config</text>
  </g>

  <g transform="translate(360 256)">
    <rect width="240" height="210" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#2f8f64"/><text x="120" y="42" class="num">2</text>
    <text x="120" y="94" class="card-title">Success-rate-first</text>
    <text x="120" y="132" class="card-desc">Prioritize invocation success</text>
    <text x="120" y="163" class="card-desc">Scope follows current version</text>
  </g>

  <g transform="translate(648 256)">
    <rect width="240" height="210" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#c56a2d"/><text x="120" y="42" class="num">3</text>
    <text x="120" y="89" class="card-title">Balanced Cost</text>
    <text x="120" y="118" class="card-title">and Experience</text>
    <text x="120" y="154" class="card-desc">Consider cost and experience</text>
    <text x="120" y="183" class="card-desc">No fixed weight formula</text>
  </g>

  <g transform="translate(936 256)">
    <rect width="240" height="210" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#7256c8"/><text x="120" y="42" class="num">4</text>
    <text x="120" y="94" class="card-title">Random</text>
    <text x="120" y="132" class="card-desc">Randomly select members</text>
    <text x="120" y="163" class="card-desc">Verify distribution in logs</text>
  </g>

  <g transform="translate(1224 256)">
    <rect width="240" height="210" rx="8" fill="#e9f7f6" stroke="#238c83" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#238c83"/><text x="120" y="42" class="num">5</text>
    <text x="120" y="94" class="card-title">Round-robin</text>
    <text x="120" y="132" class="card-desc">Select members in order</text>
    <text x="120" y="163" class="card-desc">Revalidate after changes</text>
  </g>

  <rect x="72" y="500" width="1392" height="68" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
  <text x="96" y="542" class="note">Protocol consistency is a pre-creation check item, not an automatic protocol-conversion strategy provided by the platform.</text>
</svg>
