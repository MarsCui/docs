<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="760" viewBox="0 0 2400 760" role="img" aria-labelledby="title desc">
  <title id="title">AGIOne Quick Deploy Flow</title>
  <desc id="desc">AGIOne styled SVG recreation preserving the original technical diagram structure.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#3F3F46"/>
    </marker>
    <marker id="arrow-primary" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#5F4ECF"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#3A7252"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#8A5E38"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#6A4E9A"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#4A6298"/>
    </marker>
    <style>
      .agione-text { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .node { stroke-width: 2.4; }
      .section { stroke-width: 2.4; }
      .flow { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .small { font-size: 16px; }
      .tiny { font-size: 13px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <rect x="80" y="90" width="600" height="560" rx="26" ry="26" fill="#EEF1F8" stroke="#4A6298" stroke-width="2.4" class="node" />
  <text x="380.0" y="187.24" class="agione-text" font-size="36" font-weight="600" fill="#4A6298" text-anchor="middle">
    <tspan x="380.0" dy="0">Step 1</tspan>
    <tspan x="380.0" dy="65"></tspan>
    <tspan x="380.0" dy="65">Select model template</tspan>
    <tspan x="380.0" dy="65">- Qwen2.5</tspan>
    <tspan x="380.0" dy="65">- DeepSeek</tspan>
    <tspan x="380.0" dy="65">- Qwen-VL</tspan>
    <tspan x="380.0" dy="65">- ......</tspan>
  </text>
  <rect x="950" y="90" width="600" height="560" rx="26" ry="26" fill="#F8F1EC" stroke="#8A5E38" stroke-width="2.4" class="node" />
  <text x="1250.0" y="219.74" class="agione-text" font-size="36" font-weight="600" fill="#8A5E38" text-anchor="middle">
    <tspan x="1250.0" dy="0">Step 2</tspan>
    <tspan x="1250.0" dy="65"></tspan>
    <tspan x="1250.0" dy="65">Filter available specs</tspan>
    <tspan x="1250.0" dy="65">Auto-scan compute pool</tspan>
    <tspan x="1250.0" dy="65">List all candidate plans</tspan>
    <tspan x="1250.0" dy="65">that match the spec</tspan>
  </text>
  <rect x="1800" y="90" width="560" height="560" rx="26" ry="26" fill="#EEF5F0" stroke="#3A7252" stroke-width="2.4" class="node" />
  <text x="2080.0" y="219.74" class="agione-text" font-size="36" font-weight="600" fill="#3A7252" text-anchor="middle">
    <tspan x="2080.0" dy="0">Step 3</tspan>
    <tspan x="2080.0" dy="65"></tspan>
    <tspan x="2080.0" dy="65">One-click launch &amp; deploy</tspan>
    <tspan x="2080.0" dy="65">End-to-end visualization</tspan>
    <tspan x="2080.0" dy="65">Typically goes live</tspan>
    <tspan x="2080.0" dy="65">in 10-15 minutes</tspan>
  </text>
  <path d="M680 370 L910 370" class="flow" stroke="#3F3F46" stroke-width="4" marker-end="url(#arrow-dark)" />
  <text x="790" y="335" class="agione-text" font-size="34" font-weight="400" fill="#3F3F46" text-anchor="middle">Model selected</text>
  <path d="M1550 370 L1780 370" class="flow" stroke="#3F3F46" stroke-width="4" marker-end="url(#arrow-dark)" />
  <text x="1665" y="335" class="agione-text" font-size="34" font-weight="400" fill="#3F3F46" text-anchor="middle">Spec selected</text>
</svg>
