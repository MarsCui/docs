<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'WenQuanYi Zen Hei', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f0f3f7"/>
    </linearGradient>
    <linearGradient id="accessGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="mgmtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="computeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">AGIOne Overall Platform Architecture</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#64748b">Overall Architecture — Access · Management · Compute</text>

  <!-- User -->
  <g transform="translate(510, 90)">
    <rect x="0" y="0" width="180" height="56" rx="28" fill="#1e293b" filter="url(#cardShadow)"/>
    <circle cx="32" cy="28" r="10" fill="#fff"/>
    <path d="M 22 44 Q 32 32 42 44" stroke="#fff" stroke-width="2.5" fill="none"/>
    <text x="90" y="34" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Users / Admin</text>
  </g>

  <!-- Arrow user → access -->
  <line x1="600" y1="146" x2="600" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Access Layer -->
  <g transform="translate(80, 190)">
    <rect x="0" y="0" width="1040" height="86" rx="10" fill="url(#accessGrad)" stroke="#0284c7" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="6" height="86" rx="3" fill="#0284c7"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#0284c7" letter-spacing="1.5">ACCESS LAYER</text>

    <g transform="translate(420, 36)">
      <rect x="0" y="0" width="200" height="42" rx="6" fill="#fff" stroke="#0284c7" stroke-width="1.5"/>
      <rect x="0" y="0" width="200" height="42" rx="6" fill="none" stroke="#0284c7" stroke-width="1.5"/>
      <g transform="translate(12, 11)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="#0284c7"/>
        <path d="M 4 6 L 8 6 M 4 10 L 16 10 M 4 14 L 12 14" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <text x="42" y="20" font-size="13" font-weight="600" fill="#0c4a6e">ELB Load Balancer</text>
      <text x="42" y="35" font-size="11" fill="#0369a1">443 · 80 · 18090</text>
    </g>
  </g>

  <!-- Arrow access → mgmt -->
  <line x1="600" y1="276" x2="600" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Management Layer -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="1040" height="180" rx="10" fill="url(#mgmtGrad)" stroke="#7c3aed" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="6" height="180" rx="3" fill="#7c3aed"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#6d28d9" letter-spacing="1.5">MANAGEMENT LAYER · Control Plane</text>

    <!-- Business Nodes -->
    <g transform="translate(40, 46)">
      <rect x="0" y="0" width="430" height="120" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4 3"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#7c3aed">Business Nodes (>=2)</text>

      <g transform="translate(20, 36)">
        <rect x="0" y="0" width="180" height="68" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(12, 12)">
          <rect x="0" y="0" width="22" height="22" rx="4" fill="#7c3aed"/>
          <path d="M 6 11 L 10 15 L 16 7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="44" y="22" font-size="12" font-weight="600" fill="#3b0764">AGIOne Core #1</text>
        <text x="44" y="38" font-size="10.5" fill="#6d28d9">8C / 16G</text>
        <text x="12" y="58" font-size="10" fill="#64748b">Business Service Instance</text>
      </g>

      <g transform="translate(220, 36)">
        <rect x="0" y="0" width="180" height="68" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(12, 12)">
          <rect x="0" y="0" width="22" height="22" rx="4" fill="#7c3aed"/>
          <path d="M 6 11 L 10 15 L 16 7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="44" y="22" font-size="12" font-weight="600" fill="#3b0764">AGIOne Core #2</text>
        <text x="44" y="38" font-size="10.5" fill="#6d28d9">8C / 16G</text>
        <text x="12" y="58" font-size="10" fill="#64748b">Business Service Instance · Horizontally Scalable</text>
      </g>
    </g>

    <!-- DB/MW -->
    <g transform="translate(530, 46)">
      <rect x="0" y="0" width="470" height="120" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4 3"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#7c3aed">Database &amp; Middleware Nodes (>=2)</text>

      <!-- 5 components in a row -->
      <g transform="translate(14, 36)">
        <rect x="0" y="0" width="82" height="68" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(31, 10)">
          <ellipse cx="10" cy="5" rx="10" ry="3.5" fill="#7c3aed"/>
          <path d="M 0 5 L 0 18 Q 0 21.5 10 21.5 Q 20 21.5 20 18 L 20 5" fill="#7c3aed" opacity="0.85"/>
          <ellipse cx="10" cy="5" rx="10" ry="3.5" fill="none" stroke="#fff" stroke-width="0.8"/>
        </g>
        <text x="41" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#3b0764">RDS</text>
        <text x="41" y="62" text-anchor="middle" font-size="9" fill="#7c3aed">Primary/Replica</text>
      </g>

      <g transform="translate(104, 36)">
        <rect x="0" y="0" width="82" height="68" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(31, 10)">
          <circle cx="10" cy="10" r="9" fill="none" stroke="#7c3aed" stroke-width="2"/>
          <circle cx="10" cy="10" r="3" fill="#7c3aed"/>
          <circle cx="3" cy="10" r="2" fill="#7c3aed"/>
          <circle cx="17" cy="10" r="2" fill="#7c3aed"/>
          <circle cx="10" cy="3" r="2" fill="#7c3aed"/>
        </g>
        <text x="41" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#3b0764">Nacos</text>
        <text x="41" y="62" text-anchor="middle" font-size="9" fill="#7c3aed">Service Discovery</text>
      </g>

      <g transform="translate(194, 36)">
        <rect x="0" y="0" width="82" height="68" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(31, 10)">
          <rect x="0" y="2" width="20" height="16" rx="3" fill="#7c3aed"/>
          <path d="M 3 9 L 7 9 M 3 13 L 11 13" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="16" cy="11" r="1.5" fill="#fff"/>
        </g>
        <text x="41" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#3b0764">Redis</text>
        <text x="41" y="62" text-anchor="middle" font-size="9" fill="#7c3aed">Cache</text>
      </g>

      <g transform="translate(284, 36)">
        <rect x="0" y="0" width="82" height="68" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(31, 10)">
          <circle cx="5" cy="5" r="3" fill="#7c3aed"/>
          <circle cx="15" cy="5" r="3" fill="#7c3aed"/>
          <circle cx="10" cy="15" r="3" fill="#7c3aed"/>
          <line x1="5" y1="5" x2="10" y2="15" stroke="#7c3aed" stroke-width="1.5"/>
          <line x1="15" y1="5" x2="10" y2="15" stroke="#7c3aed" stroke-width="1.5"/>
          <line x1="5" y1="5" x2="15" y2="5" stroke="#7c3aed" stroke-width="1.5"/>
        </g>
        <text x="41" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#3b0764">Kafka</text>
        <text x="41" y="62" text-anchor="middle" font-size="9" fill="#7c3aed">Messaging</text>
      </g>

      <g transform="translate(374, 36)">
        <rect x="0" y="0" width="82" height="68" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(31, 10)">
          <path d="M 2 16 L 2 8 L 6 4 L 14 4 L 18 8 L 18 16 Z" fill="#7c3aed"/>
          <path d="M 6 4 L 6 12 L 14 12 L 14 4" fill="none" stroke="#fff" stroke-width="1.2"/>
        </g>
        <text x="41" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#3b0764">MinIO</text>
        <text x="41" y="62" text-anchor="middle" font-size="9" fill="#7c3aed">Object Storage</text>
      </g>
    </g>
  </g>

  <!-- Connection between business and DB groups (inside mgmt layer) -->
  <line x1="510" y1="380" x2="570" y2="380" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="510" y1="380" x2="570" y2="380" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Arrow mgmt → compute (with port labels) -->
  <line x1="300" y1="500" x2="300" y2="540" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="900" y1="500" x2="900" y2="540" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <g transform="translate(330, 508)">
    <rect x="0" y="0" width="170" height="22" rx="11" fill="#fff" stroke="#7c3aed" stroke-width="1"/>
    <text x="85" y="15" text-anchor="middle" font-size="10.5" fill="#6d28d9" font-weight="600">6443 · 32761–32765</text>
  </g>

  <!-- Compute Layer -->
  <g transform="translate(80, 550)">
    <rect x="0" y="0" width="1040" height="180" rx="10" fill="url(#computeGrad)" stroke="#d97706" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="6" height="180" rx="3" fill="#d97706"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#92400e" letter-spacing="1.5">COMPUTE LAYER · Data Plane</text>

    <!-- Region A -->
    <g transform="translate(40, 46)">
      <rect x="0" y="0" width="460" height="120" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.2" stroke-dasharray="4 3"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#92400e">Compute Pool A · Region 1</text>

      <g transform="translate(14, 36)">
        <rect x="0" y="0" width="130" height="68" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(10, 10)">
          <polygon points="11,2 18,6 18,14 11,18 4,14 4,6" fill="#d97706"/>
          <polygon points="11,2 18,6 11,10 4,6" fill="#fbbf24"/>
        </g>
        <text x="40" y="22" font-size="11" font-weight="600" fill="#78350f">K8s Control Plane</text>
        <text x="40" y="36" font-size="10" fill="#92400e">1 or 3 Nodes</text>
        <text x="10" y="58" font-size="9.5" fill="#64748b">API · Scheduling · etcd</text>
      </g>

      <g transform="translate(154, 36)">
        <rect x="0" y="0" width="130" height="68" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(10, 10)">
          <rect x="0" y="2" width="22" height="16" rx="2" fill="#d97706"/>
          <rect x="2" y="4" width="6" height="3" fill="#fbbf24"/>
          <rect x="10" y="4" width="6" height="3" fill="#fbbf24"/>
          <rect x="2" y="9" width="6" height="3" fill="#fbbf24"/>
          <rect x="10" y="9" width="6" height="3" fill="#fbbf24"/>
        </g>
        <text x="40" y="22" font-size="11" font-weight="600" fill="#78350f">Near-Node Image Service</text>
        <text x="40" y="36" font-size="10" fill="#92400e">Registry</text>
        <text x="10" y="58" font-size="9.5" fill="#64748b">Reuses Onboarded Node Resources</text>
      </g>

      <g transform="translate(294, 36)">
        <rect x="0" y="0" width="152" height="68" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(10, 10)">
          <rect x="0" y="0" width="22" height="22" rx="3" fill="#d97706"/>
          <text x="11" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">GPU</text>
        </g>
        <text x="40" y="16" font-size="11" font-weight="600" fill="#78350f">GPU / NPU Nodes</text>
        <text x="40" y="30" font-size="10" fill="#92400e">Compute Worker Nodes</text>
        <text x="10" y="58" font-size="9.5" fill="#64748b">Hosts Training / Inference / IDE</text>
      </g>
    </g>

    <!-- Region B -->
    <g transform="translate(540, 46)">
      <rect x="0" y="0" width="460" height="120" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.2" stroke-dasharray="4 3"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#92400e">Compute Pool B · Region 2</text>

      <g transform="translate(14, 36)">
        <rect x="0" y="0" width="130" height="68" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(10, 10)">
          <polygon points="11,2 18,6 18,14 11,18 4,14 4,6" fill="#d97706"/>
          <polygon points="11,2 18,6 11,10 4,6" fill="#fbbf24"/>
        </g>
        <text x="40" y="22" font-size="11" font-weight="600" fill="#78350f">K8s Control Plane</text>
        <text x="40" y="36" font-size="10" fill="#92400e">1 or 3 Nodes</text>
        <text x="10" y="58" font-size="9.5" fill="#64748b">API · Scheduling · etcd</text>
      </g>

      <g transform="translate(154, 36)">
        <rect x="0" y="0" width="130" height="68" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(10, 10)">
          <rect x="0" y="2" width="22" height="16" rx="2" fill="#d97706"/>
          <rect x="2" y="4" width="6" height="3" fill="#fbbf24"/>
          <rect x="10" y="4" width="6" height="3" fill="#fbbf24"/>
          <rect x="2" y="9" width="6" height="3" fill="#fbbf24"/>
          <rect x="10" y="9" width="6" height="3" fill="#fbbf24"/>
        </g>
        <text x="40" y="22" font-size="11" font-weight="600" fill="#78350f">Near-Node Image Service</text>
        <text x="40" y="36" font-size="10" fill="#92400e">Registry</text>
        <text x="10" y="58" font-size="9.5" fill="#64748b">Reuses Onboarded Node Resources</text>
      </g>

      <g transform="translate(294, 36)">
        <rect x="0" y="0" width="152" height="68" rx="6" fill="#fff" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(10, 10)">
          <rect x="0" y="0" width="22" height="22" rx="3" fill="#d97706"/>
          <text x="11" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">NPU</text>
        </g>
        <text x="40" y="16" font-size="11" font-weight="600" fill="#78350f">GPU / NPU Nodes</text>
        <text x="40" y="30" font-size="10" fill="#92400e">Compute Worker Nodes</text>
        <text x="10" y="58" font-size="9.5" fill="#64748b">Hosts Training / Inference / IDE</text>
      </g>
    </g>
  </g>

  <!-- Legend bottom -->
  <g transform="translate(80, 740)">
    <rect x="0" y="-8" width="14" height="14" rx="3" fill="url(#accessGrad)" stroke="#0284c7"/>
    <text x="20" y="3" font-size="11" fill="#475569">Access Layer</text>
    <rect x="90" y="-8" width="14" height="14" rx="3" fill="url(#mgmtGrad)" stroke="#7c3aed"/>
    <text x="110" y="3" font-size="11" fill="#475569">Management Layer</text>
    <rect x="180" y="-8" width="14" height="14" rx="3" fill="url(#computeGrad)" stroke="#d97706"/>
    <text x="200" y="3" font-size="11" fill="#475569">Compute Layer</text>
  </g>
</svg>
