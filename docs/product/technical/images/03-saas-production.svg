<text x="146" y="656" font-size="11" font-weight="400" fill="#3A7252" text-anchor="start"><tspan x="146" dy="0">Each business node (8C/16G) ~= 2,000 req/min. Long-connection scenarios add ~= +500 req/min per node.</tspan></text>
<text x="60" y="720" font-size="10" font-weight="700" fill="#3F3F46" text-anchor="start"><tspan x="60" dy="0">Network Requirements:</tspan></text>
<text x="172" y="720" font-size="10" font-weight="400" fill="#3F3F46" text-anchor="start"><tspan x="172" dy="0">All components reside in the same VPC  -  Public ingress &gt;= 100 Mbps  -  Configure domain + HTTPS in production  -  Object storage uses AK/SK</tspan></text>
