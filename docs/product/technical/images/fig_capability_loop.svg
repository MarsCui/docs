  </text>
  <rect x="1460" y="710" width="600" height="180" rx="26" ry="26" fill="#F2EEF8" stroke="#6A4E9A" stroke-width="2.4" class="node" />
  <text x="1760.0" y="812.92" class="agione-text" font-size="38" font-weight="600" fill="#6A4E9A" text-anchor="middle">
    <tspan x="1760.0" dy="0">(4) Model Publishing</tspan>
  </text>
  <rect x="1660" y="450" width="620" height="180" rx="26" ry="26" fill="#ECE9F9" stroke="#4A3EB0" stroke-width="2.4" class="node" />
  <text x="1970.0" y="552.92" class="agione-text" font-size="38" font-weight="600" fill="#4A3EB0" text-anchor="middle">
    <tspan x="1970.0" dy="0">(5) Model Aggregation</tspan>
  </text>
  <rect x="1860" y="170" width="620" height="180" rx="26" ry="26" fill="#F8F1EC" stroke="#8A5E38" stroke-width="2.4" class="node" />
