  <rect width="1200" height="720" fill="url(#bg5)"/>

  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1025">算力节点纳管架构</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#71717A">Compute Pool Management · Kubernetes · 近端镜像 · GPU/NPU 调度</text>

  <!-- AGIOne Platform Management top -->
  <g transform="translate(380, 90)">
    <rect x="0" y="0" width="440" height="74" rx="10" fill="#ECE9F9" stroke="#5F4ECF" stroke-width="2" filter="url(#cardShadow5)"/>
    <rect x="0" y="0" width="6" height="74" rx="3" fill="#5F4ECF"/>
    <g transform="translate(22, 18)">
      <rect x="0" y="0" width="32" height="32" rx="5" fill="#5F4ECF"/>
      <path d="M 8 16 L 13 21 L 24 10" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="68" y="32" font-size="14" font-weight="700" fill="#4A3EB0">AGIOne 平台管理层</text>
    <text x="68" y="54" font-size="11.5" fill="#4A3EB0">Management Plane · 调度入口 · 监控聚合</text>
  </g>

  <!-- Port label band -->
