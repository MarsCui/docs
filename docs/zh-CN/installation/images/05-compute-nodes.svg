        <line x1="142" y1="22" x2="218" y2="22" stroke="#8A5E38" stroke-width="1" stroke-dasharray="2 2"/>
        <path d="M 28 30 Q 128 50 228 30" fill="none" stroke="#8A5E38" stroke-width="1" stroke-dasharray="2 2"/>
