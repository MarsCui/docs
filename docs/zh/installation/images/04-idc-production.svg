<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'WenQuanYi Zen Hei', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f0f3f7"/>
    </linearGradient>
    <linearGradient id="idcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="cardShadow4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow4dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="820" fill="url(#bg4)"/>

  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">生产部署架构 · 私有云 / IDC</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#64748b">最少 4 节点 · 2 业务节点 + 2 数据库中间件节点 · 数据自持</text>

  <!-- User -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="110" height="52" rx="26" fill="#1e293b" filter="url(#cardShadow4)"/>
    <circle cx="30" cy="26" r="9" fill="#fff"/>
    <path d="M 21 40 Q 30 30 39 40" stroke="#fff" stroke-width="2.5" fill="none"/>
    <text x="70" y="31" font-size="13" font-weight="600" fill="#fff">用户</text>
  </g>

  <line x1="170" y1="136" x2="240" y2="136" stroke="#475569" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- LB (optional, dashed) -->
  <g transform="translate(240, 100)">
    <rect x="0" y="0" width="320" height="72" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" stroke-dasharray="7 4" filter="url(#cardShadow4)"/>
    <rect x="0" y="0" width="6" height="72" rx="3" fill="#0284c7"/>
    <g transform="translate(22, 18)">
      <rect x="0" y="0" width="32" height="32" rx="5" fill="#0284c7"/>
      <path d="M 6 10 L 26 10 M 6 16 L 26 16 M 6 22 L 26 22" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="68" y="30" font-size="13" font-weight="700" fill="#0c4a6e">负载均衡 (LB)</text>
    <text x="68" y="52" font-size="11" fill="#0369a1">硬件 LB / Nginx + Keepalived · 443/80/18090</text>

    <!-- 可选 badge -->
    <g transform="translate(248, 8)">
      <rect x="0" y="0" width="56" height="20" rx="10" fill="#fff" stroke="#0284c7" stroke-width="1.2"/>
      <text x="28" y="14" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0284c7">可选</text>
    </g>
  </g>

  <!-- Bypass arrow (user → business nodes directly when no LB) -->
  <path d="M 115 162 Q 60 240 60 320 Q 60 360 220 360" stroke="#94a3b8" stroke-width="1.8" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow4dash)"/>
  <g transform="translate(8, 250)">
    <rect x="0" y="0" width="46" height="60" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="23" y="18" text-anchor="middle" font-size="10" fill="#475569" font-weight="700">无 LB</text>
    <text x="23" y="32" text-anchor="middle" font-size="9.5" fill="#64748b">直连</text>
    <text x="23" y="46" text-anchor="middle" font-size="9.5" fill="#64748b">DNS</text>
    <text x="23" y="56" text-anchor="middle" font-size="9.5" fill="#64748b">轮询</text>
  </g>

  <!-- IDC container -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="1080" height="540" rx="14" fill="url(#idcGrad)" stroke="#334155" stroke-width="2" stroke-dasharray="8 4"/>

    <!-- IDC label -->
    <g transform="translate(20, -14)">
      <rect x="0" y="0" width="200" height="28" rx="14" fill="#334155"/>
      <g transform="translate(12, 7)">
        <rect x="0" y="3" width="20" height="11" rx="1" fill="#fff"/>
        <rect x="2" y="5" width="3" height="3" fill="#334155"/>
        <rect x="7" y="5" width="3" height="3" fill="#334155"/>
      </g>
      <text x="40" y="19" font-size="12" font-weight="700" fill="#fff" letter-spacing="1">私有云 / IDC 环境</text>
    </g>

    <!-- Business Nodes -->
    <g transform="translate(40, 60)">
      <rect x="0" y="0" width="490" height="170" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
      <rect x="0" y="0" width="490" height="32" rx="10" fill="#7c3aed"/>
      <rect x="0" y="22" width="490" height="10" fill="#7c3aed"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#fff" letter-spacing="1">业务节点 · BUSINESS NODES (≥2)</text>

      <g transform="translate(30, 56)">
        <rect x="0" y="0" width="200" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(14, 14)">
          <rect x="0" y="0" width="28" height="28" rx="5" fill="#7c3aed"/>
          <path d="M 8 14 L 12 18 L 20 10" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="52" y="24" font-size="13" font-weight="700" fill="#3b0764">业务节点 #1</text>
        <text x="52" y="40" font-size="10.5" fill="#6d28d9">AGIOne Service</text>
        <line x1="14" y1="56" x2="186" y2="56" stroke="#e9d5ff" stroke-width="1"/>
        <text x="14" y="74" font-size="10.5" fill="#475569">8 核 · 16 GB</text>
        <text x="14" y="90" font-size="10.5" fill="#475569">磁盘 ≥ 200 GB</text>
      </g>

      <g transform="translate(250, 56)">
        <rect x="0" y="0" width="200" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(14, 14)">
          <rect x="0" y="0" width="28" height="28" rx="5" fill="#7c3aed"/>
          <path d="M 8 14 L 12 18 L 20 10" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="52" y="24" font-size="13" font-weight="700" fill="#3b0764">业务节点 #2</text>
        <text x="52" y="40" font-size="10.5" fill="#6d28d9">AGIOne Service</text>
        <line x1="14" y1="56" x2="186" y2="56" stroke="#e9d5ff" stroke-width="1"/>
        <text x="14" y="74" font-size="10.5" fill="#475569">8 核 · 16 GB</text>
        <text x="14" y="90" font-size="10.5" fill="#475569">磁盘 ≥ 200 GB</text>
      </g>
    </g>

    <!-- DB / Middleware Nodes -->
    <g transform="translate(550, 60)">
      <rect x="0" y="0" width="490" height="170" rx="10" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
      <rect x="0" y="0" width="490" height="32" rx="10" fill="#d97706"/>
      <rect x="0" y="22" width="490" height="10" fill="#d97706"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#fff" letter-spacing="1">数据库中间件节点 · DB/MW NODES (≥2)</text>

      <g transform="translate(30, 56)">
        <rect x="0" y="0" width="200" height="100" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(14, 14)">
          <rect x="0" y="0" width="28" height="28" rx="5" fill="#d97706"/>
          <ellipse cx="14" cy="10" rx="9" ry="2.5" fill="#fff"/>
          <path d="M 5 10 L 5 20 Q 5 22 14 22 Q 23 22 23 20 L 23 10" fill="none" stroke="#fff" stroke-width="1.2"/>
        </g>
        <text x="52" y="24" font-size="13" font-weight="700" fill="#78350f">DB/MW 节点 #1</text>
        <text x="52" y="40" font-size="10.5" fill="#92400e">RDS 主</text>
        <line x1="14" y1="56" x2="186" y2="56" stroke="#fef3c7" stroke-width="1"/>
        <text x="14" y="74" font-size="10.5" fill="#475569">8 核 · 16 GB</text>
        <text x="14" y="90" font-size="10.5" fill="#475569">磁盘 ≥ 200 GB</text>
      </g>

      <g transform="translate(250, 56)">
        <rect x="0" y="0" width="200" height="100" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
        <g transform="translate(14, 14)">
          <rect x="0" y="0" width="28" height="28" rx="5" fill="#d97706"/>
          <ellipse cx="14" cy="10" rx="9" ry="2.5" fill="#fff"/>
          <path d="M 5 10 L 5 20 Q 5 22 14 22 Q 23 22 23 20 L 23 10" fill="none" stroke="#fff" stroke-width="1.2"/>
        </g>
        <text x="52" y="24" font-size="13" font-weight="700" fill="#78350f">DB/MW 节点 #2</text>
        <text x="52" y="40" font-size="10.5" fill="#92400e">RDS 从</text>
        <line x1="14" y1="56" x2="186" y2="56" stroke="#fef3c7" stroke-width="1"/>
        <text x="14" y="74" font-size="10.5" fill="#475569">8 核 · 16 GB</text>
        <text x="14" y="90" font-size="10.5" fill="#475569">磁盘 ≥ 200 GB</text>
      </g>
    </g>

    <!-- Components row (deployed across DB/MW nodes) -->
    <g transform="translate(40, 260)">
      <rect x="0" y="0" width="1000" height="130" rx="10" fill="#fff" stroke="#475569" stroke-width="1.5"/>
      <rect x="0" y="0" width="1000" height="32" rx="10" fill="#475569"/>
      <rect x="0" y="22" width="1000" height="10" fill="#475569"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#fff" letter-spacing="1">部署组件（运行于数据库中间件节点）· DEPLOYED COMPONENTS</text>

      <g transform="translate(40, 56)">
        <rect x="0" y="0" width="170" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
        <g transform="translate(14, 16)">
          <ellipse cx="14" cy="6" rx="14" ry="4" fill="#dc2626"/>
          <path d="M 0 6 L 0 24 Q 0 30 14 30 Q 28 30 28 24 L 28 6" fill="#dc2626" opacity="0.85"/>
          <ellipse cx="14" cy="6" rx="14" ry="4" fill="none" stroke="#fff" stroke-width="0.8"/>
          <ellipse cx="14" cy="15" rx="14" ry="4" fill="none" stroke="#fff" stroke-width="0.8"/>
        </g>
        <text x="56" y="26" font-size="13" font-weight="700" fill="#7f1d1d">RDS</text>
        <text x="56" y="42" font-size="10.5" fill="#b91c1c">主从模式</text>
      </g>

      <g transform="translate(230, 56)">
        <rect x="0" y="0" width="170" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
        <g transform="translate(14, 16)">
          <circle cx="14" cy="14" r="12" fill="none" stroke="#2563eb" stroke-width="2.2"/>
          <circle cx="14" cy="14" r="4" fill="#2563eb"/>
          <circle cx="4" cy="14" r="2" fill="#2563eb"/>
          <circle cx="24" cy="14" r="2" fill="#2563eb"/>
          <circle cx="14" cy="4" r="2" fill="#2563eb"/>
          <circle cx="14" cy="24" r="2" fill="#2563eb"/>
        </g>
        <text x="56" y="26" font-size="13" font-weight="700" fill="#1e3a8a">Nacos</text>
        <text x="56" y="42" font-size="10.5" fill="#1d4ed8">服务发现</text>
      </g>

      <g transform="translate(420, 56)">
        <rect x="0" y="0" width="170" height="60" rx="8" fill="#fef2f2" stroke="#ea580c" stroke-width="1.2"/>
        <g transform="translate(14, 16)">
          <rect x="0" y="6" width="28" height="20" rx="4" fill="#ea580c"/>
          <path d="M 3 13 L 9 13 M 3 19 L 14 19" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <text x="56" y="26" font-size="13" font-weight="700" fill="#7c2d12">Redis</text>
        <text x="56" y="42" font-size="10.5" fill="#c2410c">缓存</text>
      </g>

      <g transform="translate(610, 56)">
        <rect x="0" y="0" width="170" height="60" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.2"/>
        <g transform="translate(14, 16)">
          <circle cx="6" cy="6" r="4" fill="#7c3aed"/>
          <circle cx="22" cy="6" r="4" fill="#7c3aed"/>
          <circle cx="14" cy="22" r="4" fill="#7c3aed"/>
          <line x1="6" y1="6" x2="22" y2="6" stroke="#7c3aed" stroke-width="1.8"/>
          <line x1="6" y1="6" x2="14" y2="22" stroke="#7c3aed" stroke-width="1.8"/>
          <line x1="22" y1="6" x2="14" y2="22" stroke="#7c3aed" stroke-width="1.8"/>
        </g>
        <text x="56" y="26" font-size="13" font-weight="700" fill="#3b0764">Kafka</text>
        <text x="56" y="42" font-size="10.5" fill="#6d28d9">消息</text>
      </g>

      <g transform="translate(800, 56)">
        <rect x="0" y="0" width="170" height="60" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.2"/>
        <g transform="translate(14, 16)">
          <path d="M 4 26 L 4 12 L 10 6 L 22 6 L 28 12 L 28 26 Z" fill="#0d9488"/>
          <path d="M 10 6 L 10 18 L 22 18 L 22 6" fill="none" stroke="#fff" stroke-width="1.4"/>
        </g>
        <text x="56" y="26" font-size="13" font-weight="700" fill="#134e4a">MinIO</text>
        <text x="56" y="42" font-size="10.5" fill="#0f766e">对象存储</text>
      </g>
    </g>

    <!-- NAS Shared Storage (optional) -->
    <g transform="translate(40, 410)">
      <rect x="0" y="0" width="1000" height="110" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 3"/>
      <rect x="0" y="0" width="1000" height="32" rx="10" fill="#64748b"/>
      <rect x="0" y="22" width="1000" height="10" fill="#64748b"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#fff" letter-spacing="1">NAS 共享存储 · SHARED STORAGE (可选)</text>

      <!-- 可选 badge in header -->
      <g transform="translate(910, 6)">
        <rect x="0" y="0" width="74" height="20" rx="10" fill="#fff" stroke="#fff" stroke-width="1.2"/>
        <text x="37" y="14" text-anchor="middle" font-size="10.5" font-weight="700" fill="#475569">OPTIONAL</text>
      </g>

      <!-- NAS icon + description -->
      <g transform="translate(30, 50)">
        <!-- NAS server icon (stacked rack units) -->
        <g transform="translate(0, 6)">
          <rect x="0" y="0" width="44" height="10" rx="2" fill="#64748b"/>
          <circle cx="6" cy="5" r="1.5" fill="#22c55e"/>
          <circle cx="11" cy="5" r="1.5" fill="#fff"/>
          <rect x="20" y="3" width="20" height="4" rx="1" fill="#475569"/>
          <rect x="0" y="14" width="44" height="10" rx="2" fill="#64748b"/>
          <circle cx="6" cy="19" r="1.5" fill="#22c55e"/>
          <circle cx="11" cy="19" r="1.5" fill="#fff"/>
          <rect x="20" y="17" width="20" height="4" rx="1" fill="#475569"/>
          <rect x="0" y="28" width="44" height="10" rx="2" fill="#64748b"/>
          <circle cx="6" cy="33" r="1.5" fill="#22c55e"/>
          <circle cx="11" cy="33" r="1.5" fill="#fff"/>
          <rect x="20" y="31" width="20" height="4" rx="1" fill="#475569"/>
        </g>
        <text x="64" y="22" font-size="13" font-weight="700" fill="#334155">NAS 共享存储</text>
        <text x="64" y="40" font-size="11" fill="#475569">通过 NFS / CIFS 挂载到所有节点</text>
      </g>

      <!-- Purpose chips -->
      <g transform="translate(360, 48)">
        <text x="0" y="0" font-size="11" font-weight="700" fill="#334155">主要用途</text>
        <g transform="translate(0, 12)">
          <rect x="0" y="0" width="120" height="24" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
          <circle cx="14" cy="12" r="4" fill="#0d9488"/>
          <text x="62" y="16" text-anchor="middle" font-size="10.5" fill="#334155" font-weight="600">公共日志</text>
        </g>
        <g transform="translate(130, 12)">
          <rect x="0" y="0" width="120" height="24" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
          <circle cx="14" cy="12" r="4" fill="#7c3aed"/>
          <text x="62" y="16" text-anchor="middle" font-size="10.5" fill="#334155" font-weight="600">服务配置</text>
        </g>
        <g transform="translate(260, 12)">
          <rect x="0" y="0" width="160" height="24" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
          <circle cx="14" cy="12" r="4" fill="#d97706"/>
          <text x="82" y="16" text-anchor="middle" font-size="10.5" fill="#334155" font-weight="600">共享文件 / 临时数据</text>
        </g>
      </g>

      <text x="820" y="74" font-size="10.5" fill="#64748b" font-style="italic">未部署 NAS 时，可使用本地磁盘 + 日志收集</text>
    </g>
  </g>

  <!-- Arrows from LB to business nodes -->
  <line x1="400" y1="172" x2="260" y2="276" stroke="#475569" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="400" y1="172" x2="380" y2="276" stroke="#475569" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Arrow between business and DB/MW nodes (horizontal connection) -->
  <line x1="530" y1="326" x2="610" y2="326" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <g transform="translate(540, 306)">
    <rect x="0" y="0" width="60" height="18" rx="9" fill="#fff" stroke="#94a3b8"/>
    <text x="30" y="13" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">内网</text>
  </g>

  <!-- Bottom callout -->
  <g transform="translate(60, 760)">
    <rect x="0" y="0" width="1080" height="44" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="16" y="18" font-size="11" font-weight="700" fill="#1e3a8a">最少节点合计:</text>
    <text x="120" y="18" font-size="11" fill="#1e40af">4 节点 = 2 业务节点 + 2 数据库中间件节点 · 数据库主从保证可用性</text>
    <text x="16" y="34" font-size="11" font-weight="700" fill="#1e3a8a">可选项:</text>
    <text x="120" y="34" font-size="11" fill="#1e40af">负载均衡 (LB) · NAS 共享存储  ·  未配置 LB 时可用 DNS 轮询直连业务节点</text>
  </g>
</svg>
