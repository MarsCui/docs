<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="650" viewBox="0 0 1600 650" role="img" aria-labelledby="title desc">
  <title id="title">Aggregated Model Member Adjustment and Invocation Continuity Validation Workflow</title>
  <desc id="desc">Before adjusting aggregated model members or strategy, record the original state, verify the change, complete required review, then validate continuity through read-only invocations and logs. If an exception occurs, recover according to page capabilities.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; letter-spacing: 0; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; letter-spacing: 0; }
      .card-title { font: 700 22px Arial, "Microsoft YaHei", sans-serif; fill: #182230; letter-spacing: 0; }
      .card-desc { font: 400 16px Arial, "Microsoft YaHei", sans-serif; fill: #475467; letter-spacing: 0; }
      .num { font: 700 19px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; letter-spacing: 0; }
      .band-title { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; letter-spacing: 0; }
      .band-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="650" fill="#ffffff"/>
  <text x="72" y="66" class="title">Member Adjustment and Invocation Validation Workflow</text>
  <text x="72" y="104" class="subtitle">Do not assume unchanged Endpoints, automatic scaling, or transparent changes. Validate every adjustment.</text>

  <g stroke="#667085" stroke-width="3" marker-end="url(#arrow)">
    <line x1="312" y1="300" x2="342" y2="300"/>
    <line x1="592" y1="300" x2="622" y2="300"/>
    <line x1="872" y1="300" x2="902" y2="300"/>
    <line x1="1152" y1="300" x2="1182" y2="300"/>
  </g>

  <g transform="translate(72 174)">
    <rect width="240" height="252" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#4b6fae"/><text x="32" y="32" class="num">1</text>
    <text x="24" y="86" class="card-title">Record Original State</text>
    <text x="24" y="128" class="card-desc">Aggregated model ID</text>
    <text x="24" y="160" class="card-desc">Members, strategy, prices</text>
    <text x="24" y="192" class="card-desc">Publishing and review status</text>
  </g>

  <g transform="translate(352 174)">
    <rect width="240" height="252" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#2f8f64"/><text x="32" y="32" class="num">2</text>
    <text x="24" y="86" class="card-title">Verify the Change</text>
    <text x="24" y="128" class="card-desc">Eligible member models</text>
    <text x="24" y="160" class="card-desc">Protocol and context scope</text>
    <text x="24" y="192" class="card-desc">Strategy and visibility</text>
  </g>

  <g transform="translate(632 174)">
    <rect width="240" height="252" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#c56a2d"/><text x="32" y="32" class="num">3</text>
    <text x="24" y="86" class="card-title">Submit and Review</text>
    <text x="24" y="128" class="card-desc">Save or submit on page</text>
    <text x="24" y="160" class="card-desc">Complete required review</text>
    <text x="24" y="192" class="card-desc">Confirm the change is active</text>
  </g>

  <g transform="translate(912 174)">
    <rect width="240" height="252" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#7256c8"/><text x="32" y="32" class="num">4</text>
    <text x="24" y="86" class="card-title">Read-only Validation</text>
    <text x="24" y="128" class="card-desc">Validate discovery and calls</text>
    <text x="24" y="160" class="card-desc">Review statistics and logs</text>
    <text x="24" y="192" class="card-desc">Check member selection result</text>
  </g>

  <g transform="translate(1192 174)">
    <rect width="240" height="252" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#475467"/><text x="32" y="32" class="num">5</text>
    <text x="24" y="86" class="card-title">Exception Handling</text>
    <text x="24" y="128" class="card-desc">Stop further changes</text>
    <text x="24" y="160" class="card-desc">Keep call and config evidence</text>
    <text x="24" y="192" class="card-desc">Recover by page capability</text>
  </g>

  <g transform="translate(72 474)">
    <rect width="1360" height="104" rx="8" fill="#fff8e1" stroke="#b58a16" stroke-width="2"/>
    <text x="28" y="42" class="band-title">Acceptance Focus</text>
    <text x="28" y="74" class="band-desc">Confirm the unified entry is visible, invocation succeeds, the matching strategy selects members as expected, and exceptions can be located from statistics and logs.</text>
  </g>
</svg>
