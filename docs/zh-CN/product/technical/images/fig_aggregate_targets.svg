<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">聚合模型的五种匹配策略</title>
  <desc id="desc">聚合模型提供统一 Model ID，模型提供方从成本优先、成功率优先、成本与体验均衡、随机和轮询中选择匹配策略。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .hub-title { font: 700 25px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; text-anchor: middle; }
      .hub-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; text-anchor: middle; }
      .card-title { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #182230; text-anchor: middle; }
      .card-desc { font: 400 17px Arial, "Microsoft YaHei", sans-serif; fill: #475467; text-anchor: middle; }
      .num { font: 700 19px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .note { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
    </style>
  </defs>
  <rect width="1600" height="620" fill="#ffffff"/>
  <text x="72" y="66" class="title">聚合模型的五种匹配策略</text>
  <text x="72" y="104" class="subtitle">策略选项来自当前“创建聚合模型”页面，实际路由结果需要通过调用记录验证</text>

  <g transform="translate(500 130)">
    <rect width="600" height="92" rx="8" fill="#eaf0fb" stroke="#4b6fae" stroke-width="2"/>
    <text x="300" y="39" class="hub-title">聚合模型</text>
    <text x="300" y="69" class="hub-desc">统一 Model ID · 多个符合条件的成员模型</text>
  </g>

  <g stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="800" y1="222" x2="192" y2="256"/>
    <line x1="800" y1="222" x2="480" y2="256"/>
    <line x1="800" y1="222" x2="768" y2="256"/>
    <line x1="800" y1="222" x2="1056" y2="256"/>
    <line x1="800" y1="222" x2="1344" y2="256"/>
  </g>

  <g transform="translate(72 256)">
    <rect width="240" height="210" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#4b6fae"/><text x="120" y="42" class="num">1</text>
    <text x="120" y="94" class="card-title">成本优先</text>
    <text x="120" y="132" class="card-desc">优先考虑成员成本</text>
    <text x="120" y="163" class="card-desc">价格以当前配置为准</text>
  </g>

  <g transform="translate(360 256)">
    <rect width="240" height="210" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#2f8f64"/><text x="120" y="42" class="num">2</text>
    <text x="120" y="94" class="card-title">成功率优先</text>
    <text x="120" y="132" class="card-desc">优先考虑调用成功率</text>
    <text x="120" y="163" class="card-desc">统计口径以版本为准</text>
  </g>

  <g transform="translate(648 256)">
    <rect width="240" height="210" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#c56a2d"/><text x="120" y="42" class="num">3</text>
    <text x="120" y="94" class="card-title">成本与体验均衡</text>
    <text x="120" y="132" class="card-desc">综合考虑成本和体验</text>
    <text x="120" y="163" class="card-desc">不预设固定权重公式</text>
  </g>

  <g transform="translate(936 256)">
    <rect width="240" height="210" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#7256c8"/><text x="120" y="42" class="num">4</text>
    <text x="120" y="94" class="card-title">随机</text>
    <text x="120" y="132" class="card-desc">随机选择符合条件成员</text>
    <text x="120" y="163" class="card-desc">实际分布通过日志验证</text>
  </g>

  <g transform="translate(1224 256)">
    <rect width="240" height="210" rx="8" fill="#e9f7f6" stroke="#238c83" stroke-width="2"/>
    <circle cx="120" cy="42" r="21" fill="#238c83"/><text x="120" y="42" class="num">5</text>
    <text x="120" y="94" class="card-title">轮询</text>
    <text x="120" y="132" class="card-desc">按轮询方式选择成员</text>
    <text x="120" y="163" class="card-desc">成员变化后重新验证</text>
  </g>

  <rect x="72" y="500" width="1392" height="68" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
  <text x="96" y="542" class="note">协议一致性是创建前检查项，不是平台自动完成的“协议转换”策略</text>
</svg>
