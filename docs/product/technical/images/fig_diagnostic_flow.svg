<svg xmlns="http://www.w3.org/2000/svg" width="2320" height="1480" viewBox="0 0 2320 1480" role="img" aria-labelledby="title desc">
  <title id="title">AGIOne Diagnostic Flow</title>
  <desc id="desc">AGIOne styled SVG recreation preserving the original technical diagram structure.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#3F3F46"/>
    </marker>
    <marker id="arrow-primary" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#5F4ECF"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#3A7252"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#8A5E38"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#6A4E9A"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 14 14" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="#4A6298"/>
    </marker>
    <style>
      .agione-text { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .node { stroke-width: 2.4; }
      .section { stroke-width: 2.4; }
      .flow { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .small { font-size: 16px; }
      .tiny { font-size: 13px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <rect x="580" y="55" width="1160" height="170" rx="24" ry="24" fill="#EEF1F8" stroke="#4A6298" stroke-width="2.4" class="node" />
  <text x="1160.0" y="127.56" class="agione-text" font-size="34" font-weight="600" fill="#4A6298" text-anchor="middle">
    <tspan x="1160.0" dy="0">Step 1: Inspect aggregated model RPM / Success Rate trends</tspan>
    <tspan x="1160.0" dy="48">-&gt; Locate the anomalous time window</tspan>
  </text>
  <path d="M1160 225 L1160 310" class="flow" stroke="#3F3F46" stroke-width="4" marker-end="url(#arrow-dark)" />
  <rect x="580" y="320" width="1160" height="190" rx="22" ry="22" fill="#EEF1F8" stroke="#4A6298" stroke-width="2.4" class="node" />
  <text x="1160.0" y="382.88" class="agione-text" font-size="32" font-weight="600" fill="#4A6298" text-anchor="middle">
    <tspan x="1160.0" dy="0">Step 2: Examine Running Tasks distribution</tspan>
    <tspan x="1160.0" dy="43">across backend instances</tspan>
    <tspan x="1160.0" dy="43">-&gt; Identify load-imbalanced instances</tspan>
  </text>
  <path d="M1160 510 L1160 610" class="flow" stroke="#3F3F46" stroke-width="4" marker-end="url(#arrow-dark)" />
  <rect x="600" y="620" width="1120" height="160" rx="22" ry="22" fill="#F8F1EC" stroke="#8A5E38" stroke-width="2.4" class="node" />
  <text x="1160.0" y="687.56" class="agione-text" font-size="34" font-weight="600" fill="#8A5E38" text-anchor="middle">
    <tspan x="1160.0" dy="0">Step 3: For abnormal-load instances, concurrently inspect</tspan>
    <tspan x="1160.0" dy="48">GPU utilization / VRAM / temperature</tspan>
  </text>
  <path d="M870 780 C690 885 470 920 250 990" class="flow" stroke="#4A6298" stroke-width="3" stroke-dasharray="12 12" marker-end="url(#arrow-dark)" />
  <path d="M980 780 C945 880 930 920 900 980" class="flow" stroke="#4A6298" stroke-width="4" marker-end="url(#arrow-dark)" />
  <path d="M1450 780 C1600 900 1680 930 1760 970" class="flow" stroke="#4A6298" stroke-width="4" marker-end="url(#arrow-dark)" />
  <rect x="60" y="980" width="520" height="170" rx="0" ry="0" fill="#F2EEF8" stroke="#6A4E9A" stroke-width="2.4" class="node" />
  <text x="320.0" y="1047.7" class="agione-text" font-size="30" font-weight="500" fill="#6A4E9A" text-anchor="middle">
    <tspan x="320.0" dy="0">High utilization + High RT</tspan>
    <tspan x="320.0" dy="55">= Performance bottleneck</tspan>
  </text>
  <rect x="650" y="980" width="560" height="170" rx="0" ry="0" fill="#F2EEF8" stroke="#6A4E9A" stroke-width="2.4" class="node" />
  <text x="930.0" y="1047.7" class="agione-text" font-size="30" font-weight="500" fill="#6A4E9A" text-anchor="middle">
    <tspan x="930.0" dy="0">Low utilization + High RT</tspan>
    <tspan x="930.0" dy="55">= Request pile-up (OOM / deadlock)</tspan>
  </text>
  <rect x="1280" y="960" width="1000" height="170" rx="22" ry="22" fill="#F8F1EC" stroke="#8A5E38" stroke-width="2.4" class="node" />
  <text x="1780.0" y="1032.56" class="agione-text" font-size="34" font-weight="600" fill="#8A5E38" text-anchor="middle">
    <tspan x="1780.0" dy="0">Step 4: Search inference service logs for</tspan>
    <tspan x="1780.0" dy="48">OOM / timeout / connection refused</tspan>
  </text>
  <path d="M1780 1130 L1780 1188" class="flow" stroke="#3F3F46" stroke-width="4" marker-end="url(#arrow-dark)" />
  <rect x="1280" y="1190" width="1000" height="260" rx="22" ry="22" fill="#EEF5F0" stroke="#3A7252" stroke-width="2.4" class="node" />
  <text x="1390" y="1255" class="agione-text" font-size="34" font-weight="700" fill="#3A7252" text-anchor="start">Step 5: After confirming root cause, take action</text>
  <circle cx="1395" cy="1313" r="5" fill="#3A7252"/>
  <text x="1420" y="1320" class="agione-text" font-size="28" font-weight="400" fill="#3A7252" text-anchor="start">Restart the faulty instance (after RT returns to 0)</text>
  <circle cx="1395" cy="1361" r="5" fill="#3A7252"/>
  <text x="1420" y="1368" class="agione-text" font-size="28" font-weight="400" fill="#3A7252" text-anchor="start">Adjust scheduling policy to temporarily bypass it</text>
  <circle cx="1395" cy="1409" r="5" fill="#3A7252"/>
  <text x="1420" y="1416" class="agione-text" font-size="28" font-weight="400" fill="#3A7252" text-anchor="start">File a node alert to trigger auto-remediation</text>
</svg>
