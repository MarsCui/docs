<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">从调用异常到资源状态的排查流程</title>
  <desc id="desc">从调用概览固定范围，依次查看调用日志、服务配置、部署状态、基础设施资源，最后记录证据并处理或升级。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .card-title { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .card-desc { font: 400 17px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .num { font: 700 19px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .band-title { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; }
      .band-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
    </style>
  </defs>
  <rect width="1600" height="720" fill="#ffffff"/>
  <text x="72" y="66" class="title">从调用异常到资源状态的排查流程</text>
  <text x="72" y="104" class="subtitle">先固定证据范围，再逐层核对服务和资源；不要仅凭单一指标执行资源变更</text>

  <g stroke="#667085" stroke-width="3" marker-end="url(#arrow)">
    <line x1="488" y1="249" x2="556" y2="249"/>
    <line x1="984" y1="249" x2="1052" y2="249"/>
    <path d="M 1286 356 L 1286 390 L 314 390 L 314 424" fill="none"/>
    <line x1="488" y1="535" x2="556" y2="535"/>
    <line x1="984" y1="535" x2="1052" y2="535"/>
  </g>

  <g transform="translate(72 142)">
    <rect width="416" height="214" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="34" cy="34" r="21" fill="#4b6fae"/><text x="34" y="34" class="num">1</text>
    <text x="70" y="43" class="card-title">固定异常范围</text>
    <text x="26" y="101" class="card-desc">确认时间范围、模型和异常类型</text>
    <text x="26" y="139" class="card-desc">记录调用总量、成功、失败和限流</text>
    <text x="26" y="177" class="card-desc">从概览或统计进入明细</text>
  </g>

  <g transform="translate(556 142)">
    <rect width="428" height="214" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="34" cy="34" r="21" fill="#2f8f64"/><text x="34" y="34" class="num">2</text>
    <text x="70" y="43" class="card-title">查看调用日志</text>
    <text x="26" y="101" class="card-desc">核对单次请求状态和错误信息</text>
    <text x="26" y="139" class="card-desc">记录耗时、首 Token 时间和调用 ID</text>
    <text x="26" y="177" class="card-desc">确认异常是否集中于特定模型</text>
  </g>

  <g transform="translate(1052 142)">
    <rect width="476" height="214" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="34" cy="34" r="21" fill="#c56a2d"/><text x="34" y="34" class="num">3</text>
    <text x="70" y="43" class="card-title">核对服务配置</text>
    <text x="26" y="101" class="card-desc">发布、审核、可见范围和 Endpoint</text>
    <text x="26" y="139" class="card-desc">Key、配额、限流和模型状态</text>
    <text x="26" y="177" class="card-desc">确认当前账号具备调用条件</text>
  </g>

  <g transform="translate(72 424)">
    <rect width="416" height="222" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
    <circle cx="34" cy="34" r="21" fill="#7256c8"/><text x="34" y="34" class="num">4</text>
    <text x="70" y="43" class="card-title">检查部署状态</text>
    <text x="26" y="101" class="card-desc">查看我的部署或在线推理状态</text>
    <text x="26" y="139" class="card-desc">核对任务、地域和资源方案</text>
    <text x="26" y="177" class="card-desc">收集页面事件或日志入口信息</text>
  </g>

  <g transform="translate(556 424)">
    <rect width="428" height="222" rx="8" fill="#e9f7f6" stroke="#238c83" stroke-width="2"/>
    <circle cx="34" cy="34" r="21" fill="#238c83"/><text x="34" y="34" class="num">5</text>
    <text x="70" y="43" class="card-title">检查资源状态</text>
    <text x="26" y="101" class="card-desc">查看集群、节点、设备和作业</text>
    <text x="26" y="139" class="card-desc">核对资源水位、显存、温度和健康</text>
    <text x="26" y="177" class="card-desc">判断资源异常是否与请求同一时段</text>
  </g>

  <g transform="translate(1052 424)">
    <rect width="476" height="222" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
    <circle cx="34" cy="34" r="21" fill="#475467"/><text x="34" y="34" class="num">6</text>
    <text x="70" y="43" class="card-title">形成结论并处理</text>
    <text x="26" y="101" class="card-desc">汇总调用、配置、部署和资源证据</text>
    <text x="26" y="139" class="card-desc">按当前角色权限处理或升级</text>
    <text x="26" y="177" class="card-desc">变更前确认影响范围和回退方式</text>
  </g>
</svg>
