<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680" role="img" aria-labelledby="title desc">
  <title id="title">AGIOne Core Capabilities Overview</title>
  <desc id="desc">Six business stages, Invocation Observability, and Settings and Access Control form eight capabilities.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .stage { font: 700 21.5px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .stage-small { font: 700 18.5px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .card-desc { font: 400 15.5px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .num { font: 700 20px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .band-title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; }
      .band-desc { font: 400 17px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .label { font: 700 16px Arial, "Microsoft YaHei", sans-serif; fill: #344054; letter-spacing: 0; }
      .footer { font: 400 16px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
    </style>
  </defs>

  <rect width="1600" height="680" fill="#ffffff"/>

  <text x="72" y="66" class="title">AGIOne Core Capabilities Overview</text>
  <text x="72" y="104" class="subtitle">An end-to-end business loop across Compute, Model, Service, and Operations</text>
  <text x="1528" y="84" class="label" text-anchor="end">6 business stages · 2 cross-cutting capabilities</text>

  <line x1="286" y1="245" x2="321" y2="245" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="534" y1="245" x2="569" y2="245" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="782" y1="245" x2="817" y2="245" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1030" y1="245" x2="1065" y2="245" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1278" y1="245" x2="1313" y2="245" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(72 150)">
    <rect width="214" height="190" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#4b6fae"/>
    <text x="32" y="32" class="num">1</text>
    <text x="24" y="78" class="stage">Compute</text>
    <text x="24" y="104" class="stage">Management</text>
    <text x="24" y="132" class="card-desc">Regions · clusters · nodes</text>
    <text x="24" y="156" class="card-desc">Accelerators · specs</text>
    <text x="24" y="180" class="card-desc">Unified resource pooling</text>
  </g>

  <g transform="translate(320 150)">
    <rect width="214" height="190" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#2f8f64"/>
    <text x="32" y="32" class="num">2</text>
    <text x="24" y="82" class="stage">Model Templates</text>
    <text x="24" y="116" class="card-desc">Model · VRAM settings</text>
    <text x="24" y="145" class="card-desc">Frameworks · inference</text>
    <text x="24" y="174" class="card-desc">Reusable templates</text>
  </g>

  <g transform="translate(568 150)">
    <rect width="214" height="190" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#c56a2d"/>
    <text x="32" y="32" class="num">3</text>
    <text x="24" y="78" class="stage">Rapid</text>
    <text x="24" y="104" class="stage">Deployment</text>
    <text x="24" y="132" class="card-desc">Select model and spec</text>
    <text x="24" y="156" class="card-desc">Submit and track status</text>
    <text x="24" y="180" class="card-desc">Productized workflow</text>
  </g>

  <g transform="translate(816 150)">
    <rect width="214" height="190" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#7256c8"/>
    <text x="32" y="32" class="num">4</text>
    <text x="24" y="82" class="stage">Model Publishing</text>
    <text x="24" y="116" class="card-desc">Publish · review · scope</text>
    <text x="24" y="145" class="card-desc">Pricing · limits · calls</text>
    <text x="24" y="174" class="card-desc">Service-ready models</text>
  </g>

  <g transform="translate(1064 150)">
    <rect width="214" height="190" rx="8" fill="#e9f7f6" stroke="#238c83" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#238c83"/>
    <text x="32" y="32" class="num">5</text>
    <text x="24" y="78" class="stage">Model</text>
    <text x="24" y="104" class="stage">Aggregation</text>
    <text x="24" y="132" class="card-desc">Member orchestration</text>
    <text x="24" y="156" class="card-desc">Unified entry · routing</text>
    <text x="24" y="180" class="card-desc">Cost and availability</text>
  </g>

  <g transform="translate(1312 150)">
    <rect width="216" height="190" rx="8" fill="#fff8e1" stroke="#b58a16" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#b58a16"/>
    <text x="32" y="32" class="num">6</text>
    <text x="24" y="78" class="stage-small">Metering &amp; Billing</text>
    <text x="24" y="104" class="stage-small">Financial Operations</text>
    <text x="24" y="142" class="card-desc">Usage · bills · settlement</text>
    <text x="24" y="171" class="card-desc">Finance · License ops</text>
  </g>

  <g stroke="#b8c2d0" stroke-width="2" stroke-dasharray="5 8">
    <line x1="179" y1="340" x2="179" y2="382"/>
    <line x1="427" y1="340" x2="427" y2="382"/>
    <line x1="675" y1="340" x2="675" y2="382"/>
    <line x1="923" y1="340" x2="923" y2="382"/>
    <line x1="1171" y1="340" x2="1171" y2="382"/>
    <line x1="1420" y1="340" x2="1420" y2="382"/>
  </g>

  <g transform="translate(72 382)">
    <rect width="1456" height="104" rx="8" fill="#eaf0fb" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="45" cy="52" r="24" fill="#4b6fae"/>
    <text x="45" y="52" class="num">7</text>
    <text x="88" y="43" class="band-title">Invocation Observability</text>
    <text x="88" y="75" class="band-desc">Across the chain: hardware resources → deployment status → model services → business invocations, with monitoring, analytics, and anomaly diagnosis</text>
  </g>

  <g transform="translate(72 506)">
    <rect width="1456" height="104" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
    <circle cx="45" cy="52" r="24" fill="#475467"/>
    <text x="45" y="52" class="num">8</text>
    <text x="88" y="43" class="band-title">Settings and Access Control</text>
    <text x="88" y="75" class="band-desc">Governance foundation: identities, organizations, members, roles, permissions, audit, and API rate controls define visibility and access</text>
  </g>

  <text x="1528" y="650" class="footer" text-anchor="end">Mapped one-to-one to the eight sections in Core Capabilities and Features</text>
</svg>
