  <path d="M680 1625 C1120 1700 1820 1280 2225 1040" class="flow" stroke="#4A6298" stroke-width="2.5" stroke-dasharray="8 12" opacity="0.6" marker-end="url(#arrow-blue)" />
  <path d="M1320 1350 C1580 1350 1890 1070 2225 1005" class="flow" stroke="#4A6298" stroke-width="2.5" stroke-dasharray="8 12" opacity="0.6" marker-end="url(#arrow-blue)" />
  <path d="M1680 1080 C1840 1080 2025 1000 2225 970" class="flow" stroke="#4A6298" stroke-width="2.5" stroke-dasharray="8 12" opacity="0.6" marker-end="url(#arrow-blue)" />
  <path d="M2060 800 C2135 800 2175 900 2225 930" class="flow" stroke="#4A6298" stroke-width="2.5" stroke-dasharray="8 12" opacity="0.6" marker-end="url(#arrow-blue)" />
  <path d="M2225 630 C2240 705 2295 785 2360 835" class="flow" stroke="#4A6298" stroke-width="2.5" stroke-dasharray="8 12" opacity="0.6" marker-end="url(#arrow-blue)" />
  <path d="M2450 350 C2475 505 2475 680 2470 835" class="flow" stroke="#4A6298" stroke-width="2.5" stroke-dasharray="8 12" opacity="0.6" marker-end="url(#arrow-blue)" />
  <path d="M2450 1085 C2360 1400 1900 1720 680 1650" class="flow" stroke="#8A5E38" stroke-width="4" stroke-dasharray="16 16" marker-end="url(#arrow-orange)" />
  <rect x="1180" y="1885" width="630" height="105" rx="14" ry="14" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="2.4" class="node" />
  <text x="1495.0" y="1927.7" class="agione-text" font-size="30" font-weight="500" fill="#3F3F46" text-anchor="middle">
    <tspan x="1495.0" dy="0">Resource Utilization Feedback</tspan>
    <tspan x="1495.0" dy="40">(drives planning and scaling)</tspan>
  </text>
</svg>
