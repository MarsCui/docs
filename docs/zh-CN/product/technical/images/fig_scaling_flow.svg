<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="650" viewBox="0 0 1600 650" role="img" aria-labelledby="title desc">
  <title id="title">聚合模型成员调整与调用连续性验证流程</title>
  <desc id="desc">调整聚合模型成员或策略前记录原状态，核对变更、完成必要审核，再通过只读调用和日志验证连续性，异常时按页面能力恢复。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .subtitle { font: 400 21px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .card-title { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #182230; }
      .card-desc { font: 400 17px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
      .num { font: 700 19px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .band-title { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #20304a; }
      .band-desc { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #475467; }
    </style>
  </defs>
  <rect width="1600" height="650" fill="#ffffff"/>
  <text x="72" y="66" class="title">聚合模型成员调整与调用连续性验证流程</text>
  <text x="72" y="104" class="subtitle">不默认承诺 Endpoint 不变、自动扩缩容或业务无感，每次调整都需要验证</text>

  <g stroke="#667085" stroke-width="3" marker-end="url(#arrow)">
    <line x1="312" y1="300" x2="342" y2="300"/>
    <line x1="592" y1="300" x2="622" y2="300"/>
    <line x1="872" y1="300" x2="902" y2="300"/>
    <line x1="1152" y1="300" x2="1182" y2="300"/>
  </g>

  <g transform="translate(72 174)">
    <rect width="240" height="252" rx="8" fill="#edf3ff" stroke="#4b6fae" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#4b6fae"/><text x="32" y="32" class="num">1</text>
    <text x="24" y="86" class="card-title">记录原状态</text>
    <text x="24" y="128" class="card-desc">聚合模型标识</text>
    <text x="24" y="160" class="card-desc">成员、策略与价格</text>
    <text x="24" y="192" class="card-desc">发布和审核状态</text>
  </g>

  <g transform="translate(352 174)">
    <rect width="240" height="252" rx="8" fill="#eaf7f0" stroke="#2f8f64" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#2f8f64"/><text x="32" y="32" class="num">2</text>
    <text x="24" y="86" class="card-title">核对变更</text>
    <text x="24" y="128" class="card-desc">成员是否符合条件</text>
    <text x="24" y="160" class="card-desc">协议与上下文范围</text>
    <text x="24" y="192" class="card-desc">策略和可见范围</text>
  </g>

  <g transform="translate(632 174)">
    <rect width="240" height="252" rx="8" fill="#fff2e8" stroke="#c56a2d" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#c56a2d"/><text x="32" y="32" class="num">3</text>
    <text x="24" y="86" class="card-title">提交与审核</text>
    <text x="24" y="128" class="card-desc">按页面保存或提交</text>
    <text x="24" y="160" class="card-desc">完成必要审核</text>
    <text x="24" y="192" class="card-desc">确认变更已生效</text>
  </g>

  <g transform="translate(912 174)">
    <rect width="240" height="252" rx="8" fill="#f1eeff" stroke="#7256c8" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#7256c8"/><text x="32" y="32" class="num">4</text>
    <text x="24" y="86" class="card-title">只读验证</text>
    <text x="24" y="128" class="card-desc">验证发现与调用入口</text>
    <text x="24" y="160" class="card-desc">查看调用统计与日志</text>
    <text x="24" y="192" class="card-desc">核对成员选择结果</text>
  </g>

  <g transform="translate(1192 174)">
    <rect width="240" height="252" rx="8" fill="#f2f4f7" stroke="#667085" stroke-width="2"/>
    <circle cx="32" cy="32" r="20" fill="#475467"/><text x="32" y="32" class="num">5</text>
    <text x="24" y="86" class="card-title">异常处理</text>
    <text x="24" y="128" class="card-desc">停止继续变更</text>
    <text x="24" y="160" class="card-desc">保留调用和配置证据</text>
    <text x="24" y="192" class="card-desc">按页面能力恢复</text>
  </g>

  <g transform="translate(72 474)">
    <rect width="1360" height="104" rx="8" fill="#fff8e1" stroke="#b58a16" stroke-width="2"/>
    <text x="28" y="42" class="band-title">验收重点</text>
    <text x="28" y="74" class="band-desc">统一入口是否可见、调用是否成功、匹配策略是否按预期选择成员、异常是否可从统计和日志中定位</text>
  </g>
</svg>
