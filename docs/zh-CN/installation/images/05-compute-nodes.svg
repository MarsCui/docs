        <line x1="20" y1="38" x2="200" y2="38" stroke="#F8F1EC" stroke-width="1"/>
        <text x="20" y="58" font-size="11" font-weight="600" fill="#8A5E38">节点总数 &lt; 3</text>
        <text x="20" y="74" font-size="10.5" fill="#8A5E38">→ 1 台部署 K8s 控制面</text>
        <text x="20" y="98" font-size="11" font-weight="600" fill="#8A5E38">节点总数 ≥ 3</text>
        <text x="20" y="114" font-size="10.5" fill="#8A5E38">→ 3 台部署 K8s 控制面</text>
