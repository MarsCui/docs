  <text x="790" y="1220" class="agione-text" font-size="32" font-weight="400" fill="#3A7252" text-anchor="start">Choose the Best</text>
  <path d="M1045 1260 C1055 1208 1080 1140 1120 1115" class="flow" stroke="#3A7252" stroke-width="5" marker-end="url(#arrow-green)" />
  <text x="1185" y="965" class="agione-text" font-size="32" font-weight="400" fill="#8A5E38" text-anchor="start">Instance Ready</text>
  <path d="M1405 1015 C1405 930 1425 845 1460 800" class="flow" stroke="#8A5E38" stroke-width="5" marker-end="url(#arrow-orange)" />
  <text x="1615" y="680" class="agione-text" font-size="32" font-weight="400" fill="#6A4E9A" text-anchor="start">Endpoint</text>
  <path d="M1760 710 L1760 630" class="flow" stroke="#6A4E9A" stroke-width="5" marker-end="url(#arrow-purple)" />
