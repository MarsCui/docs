    <!-- Internal arrows -->
    <line x1="350" y1="100" x2="378" y2="100" stroke="#8A5E38" stroke-width="1.5" stroke-dasharray="3 2"/>
    <line x1="170" y1="124" x2="100" y2="180" stroke="#8A5E38" stroke-width="1.5" stroke-dasharray="3 2"/>
